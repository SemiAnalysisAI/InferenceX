name: Test Changelog Gate
run-name: Test Changelog Gate - ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches-ignore:
      - main
    paths:
      - ".claude/commands/recover-failed-ingest.md"
      - ".github/workflows/run-sweep.yml"
      - ".github/workflows/test-changelog-gate.yml"
      - "utils/find_reusable_sweep_run.py"
      - "utils/test_find_reusable_sweep_run.py"
      - "utils/process_changelog.py"
      - "utils/prepare_perf_changelog_merge.py"
      - "utils/recover_failed_ingest.py"
      - "utils/changelog_gate_tests/test_prepare_perf_changelog_merge.py"
      - "utils/changelog_gate_tests/test_recover_failed_ingest.py"
      - "utils/test_validate_reusable_sweep_artifacts.py"
      - "utils/validate_perf_changelog.py"
      - "utils/validate_reusable_sweep_artifacts.py"
      - "utils/changelog_gate_tests/test_validate_perf_changelog.py"
      - "utils/changelog_gate_tests/test_run_sweep_gating.py"
      - "utils/changelog_gate_tests/conftest.py"
      - "utils/merge_with_reuse.sh"
      - "utils/matrix_logic/**"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: test-changelog-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-changelog:
    name: Test changelog validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pydantic pyyaml

      - name: Run validator, reuse, and gating tests
        run: |
          python -m pytest \
            utils/changelog_gate_tests/test_validate_perf_changelog.py \
            utils/test_find_reusable_sweep_run.py \
            utils/changelog_gate_tests/test_prepare_perf_changelog_merge.py \
            utils/changelog_gate_tests/test_recover_failed_ingest.py \
            utils/test_validate_reusable_sweep_artifacts.py \
            utils/changelog_gate_tests/test_run_sweep_gating.py \
            -v

      - name: Test historical push validation
        run: |
          expect_rejected() {
              local label="$1"
              local expected="$2"
              shift 2
              local output
              if output="$("$@" 2>&1)"; then
                  echo "::error::${label} was unexpectedly accepted"
                  return 1
              fi
              if ! grep -Fq -- "$expected" <<<"$output"; then
                  echo "::error::${label} failed for the wrong reason; expected output containing: ${expected}"
                  printf '%s\n' "$output"
                  return 1
              fi
              echo "${label} was rejected as expected"
              printf '%s\n' "$output"
          }

          python utils/validate_perf_changelog.py \
            --changelog-file perf-changelog.yaml \
            --base-ref d99c824b1c4f0b1b007631191657e458ef2a332c^ \
            --head-ref d99c824b1c4f0b1b007631191657e458ef2a332c

          expect_rejected "PR #1767 malformed merge state" \
            "trailing whitespace" \
            python utils/validate_perf_changelog.py \
              --changelog-file perf-changelog.yaml \
              --base-ref 7b9843d3a6e1fe7a2d92d327e25aae57ed3506c5^ \
              --head-ref 7b9843d3a6e1fe7a2d92d327e25aae57ed3506c5 \
              --pr-number 1767

          git fetch --no-tags origin \
            "+refs/pull/1798/head:refs/remotes/origin/pr-1798-head"
          expect_rejected "PR #1798 invalid merge state" \
            "trailing whitespace" \
            python utils/validate_perf_changelog.py \
              --changelog-file perf-changelog.yaml \
              --base-ref "refs/remotes/origin/pr-1798-head^1" \
              --head-ref refs/remotes/origin/pr-1798-head \
              --pr-number 1798

      - name: Validate the associated pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRS="$(
              gh pr list \
                --repo "$GITHUB_REPOSITORY" \
                --state open \
                --head "$GITHUB_REF_NAME" \
                --json number,baseRefName,headRefOid
          )"
          PR_COUNT="$(jq 'length' <<<"$PRS")"

          if [ "$PR_COUNT" -eq 0 ]; then
              echo "::notice::No open pull request found for branch ${GITHUB_REF_NAME}; skipping PR-diff validation"
              exit 0
          fi
          if [ "$PR_COUNT" -ne 1 ]; then
              echo "::error::Expected exactly one open pull request for branch ${GITHUB_REF_NAME}; found ${PR_COUNT}"
              jq -r '.[] | "  #\(.number) base=\(.baseRefName) head=\(.headRefOid)"' <<<"$PRS"
              exit 1
          fi

          PR_NUMBER="$(jq -r '.[0].number' <<<"$PRS")"
          BASE_BRANCH="$(jq -r '.[0].baseRefName' <<<"$PRS")"
          PR_HEAD_SHA="$(jq -r '.[0].headRefOid' <<<"$PRS")"
          if [ "$PR_HEAD_SHA" != "$GITHUB_SHA" ]; then
              echo "::error::PR #${PR_NUMBER} head ${PR_HEAD_SHA} does not match pushed SHA ${GITHUB_SHA}"
              exit 1
          fi

          git fetch --no-tags origin \
            "+refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}"

          if git diff --quiet \
            "origin/${BASE_BRANCH}...${GITHUB_SHA}" \
            -- perf-changelog.yaml; then
              echo "::notice::PR #${PR_NUMBER} does not change perf-changelog.yaml; skipping PR-diff validation"
              exit 0
          fi

          python utils/validate_perf_changelog.py \
            --changelog-file perf-changelog.yaml \
            --base-ref "origin/${BASE_BRANCH}" \
            --head-ref "$GITHUB_SHA" \
            --pr-number "$PR_NUMBER"
