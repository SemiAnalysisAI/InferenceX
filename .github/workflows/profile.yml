name: Profile

on:
  workflow_dispatch:
    inputs:
      config-key:
        description: "Config key from config yaml"
        required: true
        type: string
      config-file:
        description: "Config file to use"
        required: false
        type: string
        default: '.github/configs/nvidia-master.yaml'
      conc:
        description: "Space-separated concurrency values"
        required: false
        type: string
        default: '64'
      seq-lens:
        description: "Space-separated sequence lengths"
        required: false
        type: string
        default: '1k1k'
      m3-profile-phase:
        description: "MiniMax M3 phase to capture"
        required: false
        type: choice
        options:
          - decode
          - prefill
        default: decode
      m3-profile-token-budget:
        description: "MiniMax M3 max batched tokens while profiling"
        required: false
        type: choice
        options:
          - '8192'
          - '16384'
          - '32768'
        default: '8192'
      moe-debug:
        description: "Enable MoE debug patch and log (MOE_DEBUG_LOG)"
        required: false
        type: boolean
        default: false
      ref:
        description: "Ref (branch/sha) to checkout"
        required: false
        type: string

permissions:
  contents: read

env:
  HF_TOKEN: ${{ secrets.INFERENCEX_OFFICIAL_RO_HF_TOKEN }}
  HF_HUB_CACHE: '/mnt/hf_hub_cache/'
  RANDOM_RANGE_RATIO: '0.8'
  PERFETTO_RELAY_URL: https://semianalysisai.github.io/InferenceX-trace-storage
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHONPYCACHEPREFIX: /tmp/inferencex-pycache

jobs:
  get-jobs:
    runs-on: ubuntu-latest
    outputs:
      filtered-matrix: ${{ steps.filter.outputs.filtered }}
      count: ${{ steps.filter.outputs.count }}
      source-sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - id: source
        name: Record source revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - id: gen
        name: Generate profile matrix
        env:
          CONFIG_FILE: ${{ inputs.config-file }}
          CONFIG_KEY: ${{ inputs.config-key }}
          CONC_VALUES: ${{ inputs.conc }}
          SEQ_LENS: ${{ inputs.seq-lens }}
        shell: bash
        run: |
          set -euo pipefail
          pip install pydantic

          read -r -a conc_values <<< "$CONC_VALUES"
          read -r -a seq_lens <<< "$SEQ_LENS"
          cmd=(
            python3 "${GITHUB_WORKSPACE}/utils/matrix_logic/generate_sweep_configs.py"
            test-config
            --config-files "$CONFIG_FILE"
            --config-keys "$CONFIG_KEY"
          )
          if [ "${#conc_values[@]}" -gt 0 ]; then
            cmd+=(--conc "${conc_values[@]}")
          fi
          if [ "${#seq_lens[@]}" -gt 0 ]; then
            cmd+=(--seq-lens "${seq_lens[@]}")
          fi

          config_json="$("${cmd[@]}")"
          echo "raw=$config_json" >> "$GITHUB_OUTPUT"

      - id: filter
        name: Validate generated jobs
        env:
          RAW_MATRIX: ${{ steps.gen.outputs.raw }}
        shell: python
        run: |
          import json
          import os

          data = json.loads(os.environ["RAW_MATRIX"])
          if not isinstance(data, list):
              raise SystemExit("Generator output is not a list")
          if not data:
              raise SystemExit("No profile entries matched the requested filters")
          if len(data) > 24:
              raise SystemExit(f"Refusing to profile {len(data)} entries; maximum is 24")

          identities = {
              (
                  item["runner"],
                  item["exp-name"],
                  item["isl"],
                  item["osl"],
                  item["tp"],
                  item.get("ep", 1),
                  item["conc"],
              )
              for item in data
          }
          if len(identities) != len(data):
              raise SystemExit("Generated profile matrix contains duplicate jobs")

          output = json.dumps(data, separators=(",", ":"))
          print(json.dumps(data, indent=2))
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"filtered={output}\n")
              f.write(f"count={len(data)}\n")

  profile:
    needs: get-jobs
    timeout-minutes: 500
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        config: ${{ fromJson(needs.get-jobs.outputs.filtered-matrix) }}
    runs-on: ${{ matrix.config.runner == 'mi300x' && 'mi300x-amds_04' || matrix.config.runner }}
    env:
      EXP_NAME: ${{ matrix.config.exp-name }}
      MODEL: ${{ matrix.config.model }}
      MODEL_PREFIX: ${{ matrix.config.model-prefix }}
      ISL: ${{ matrix.config.isl }}
      OSL: ${{ matrix.config.osl }}
      MAX_MODEL_LEN: ${{ matrix.config.max-model-len }}
      IMAGE: ${{ matrix.config.image }}
      FRAMEWORK: ${{ matrix.config.framework }}
      PRECISION: ${{ matrix.config.precision }}
      TP: ${{ matrix.config.tp }}
      EP_SIZE: ${{ matrix.config.ep }}
      DP_ATTENTION: ${{ matrix.config['dp-attn'] }}
      CONC: ${{ matrix.config.conc }}
      SPEC_DECODING: ${{ matrix.config.spec-decoding }}
      DISAGG: ${{ matrix.config.disagg }}
      RUN_EVAL: 'false'
      EVAL_ONLY: 'false'
      SCENARIO_SUBDIR: ${{ matrix.config['scenario-type'] == 'agentic-coding' && 'agentic/' || 'fixed_seq_len/' }}
      M3_PROFILE_NODE: chi-mi300x-035
      M3_PROFILE_PHASE: ${{ inputs.m3-profile-phase }}
      M3_PROFILE_TOKEN_BUDGET: ${{ inputs.m3-profile-token-budget }}
      MOE_DEBUG: '0'
      MOE_DEBUG_LOG: ${{ inputs.moe-debug && '/workspace/moe_debug.tp0.log' || '' }}
    steps:
      - name: Resource cleanup
        run: |
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            docker ps -aq | xargs -r docker rm -f
            docker network prune -f
            while [ -n "$(docker ps -aq)" ]; do
              docker ps -a
              sleep 5
            done
          fi

          if command -v squeue >/dev/null 2>&1; then
            scancel --name="${{ runner.name }}" || true
            while [ -n "$(squeue --name='${{ runner.name }}' --noheader --format='%i')" ]; do
              squeue --name="${{ runner.name }}"
              sleep 5
            done
          fi

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.get-jobs.outputs.source-sha }}
          clean: true

      - name: Launch and profile
        id: run
        env:
          RUNNER_NAME: ${{ runner.name }}
          PROFILE: '1'
          VLLM_RPC_TIMEOUT: '1800000'
        shell: bash
        run: |
          set -euo pipefail
          ep_val="${EP_SIZE:-1}"
          profile_suffix="_${M3_PROFILE_PHASE}_bt${M3_PROFILE_TOKEN_BUDGET}_windowed"
          res_name="${EXP_NAME}_${PRECISION}_${FRAMEWORK}_tp${TP}_ep${ep_val}_dpa-${DP_ATTENTION}_conc${CONC}_${RUNNER_NAME}${profile_suffix}"
          trace_path="profile_${res_name}.trace.json.gz"
          summary_path="profile_summary_${res_name}.json"

          export RESULT_FILENAME="$res_name"
          export VLLM_TORCH_PROFILER_DIR="/tmp/inferencex-profile/${res_name}"
          export SGLANG_TORCH_PROFILER_DIR="$VLLM_TORCH_PROFILER_DIR"
          echo "RESULT_FILENAME=$res_name" >> "$GITHUB_ENV"

          rm -f "$trace_path" "$summary_path"

          bash "./runners/launch_${RUNNER_NAME%%_*}.sh"

          if [ ! -f "${res_name}.json" ]; then
            echo "Run failed: benchmark result ${res_name}.json not found" >&2
            exit 1
          fi
          if [ ! -s "$trace_path" ]; then
            echo "Run failed: profile trace $trace_path not found or empty" >&2
            exit 1
          fi

          python3 utils/analyze_profile_trace.py \
            "$trace_path" \
            --expected-concurrency "$CONC" \
            --phase "$M3_PROFILE_PHASE" \
            --output "$summary_path"

          echo "trace=$trace_path" >> "$GITHUB_OUTPUT"
          echo "summary=$summary_path" >> "$GITHUB_OUTPUT"

      - name: Process result
        env:
          RUNNER_TYPE: ${{ matrix.config.runner }}
        run: python3 utils/process_result.py

      - name: Upload profile trace
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: profile_trace_${{ env.RESULT_FILENAME }}
          path: ${{ steps.run.outputs.trace }}
          if-no-files-found: error

      - name: Upload profile analysis
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: profile_analysis_${{ env.RESULT_FILENAME }}
          path: |
            ${{ steps.run.outputs.summary }}
            agg_${{ env.RESULT_FILENAME }}.json
          if-no-files-found: error

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: profile_server_logs_${{ env.RESULT_FILENAME }}
          path: server.log
          if-no-files-found: ignore

      - name: Upload GPU metrics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: profile_gpu_metrics_${{ env.RESULT_FILENAME }}
          path: gpu_metrics.csv
          if-no-files-found: ignore

      - name: Upload MoE debug log
        if: ${{ env.MOE_DEBUG == '1' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: moe_debug_${{ env.RESULT_FILENAME }}
          path: moe_debug.tp0.log
          if-no-files-found: ignore

  publish:
    needs: [get-jobs, profile]
    if: ${{ needs.profile.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download profile traces
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: profile_trace_*
          path: downloaded
          merge-multiple: true

      - name: Checkout storage repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: SemiAnalysisAI/InferenceX-trace-storage
          path: storage
          ref: master
          ssh-key: ${{ secrets.PROFILER_STORAGE_DEPLOY_KEY }}
          fetch-depth: 0

      - name: Publish traces and Perfetto links
        env:
          SOURCE_SHA: ${{ needs.get-jobs.outputs.source-sha }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          traces=(downloaded/profile_*.trace.json.gz)
          if [ "${#traces[@]}" -eq 0 ]; then
            echo "No downloaded traces found" >&2
            exit 1
          fi

          for trace in "${traces[@]}"; do
            filename="$(basename "$trace")"
            result_name="${filename#profile_}"
            result_name="${result_name%.trace.json.gz}"
            dest_dir="storage/profiles/${SOURCE_SHA}/${result_name}"
            mkdir -p "$dest_dir"
            cp "$trace" "$dest_dir/trace.json.gz"
          done

          pushd storage >/dev/null
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profiles
          git commit -m "Add MI300X profiles for ${SOURCE_SHA}" || true

          pushed=0
          for attempt in 1 2 3; do
            git fetch origin master
            git rebase origin/master
            if git push origin HEAD:master; then
              pushed=1
              break
            fi
            sleep $((attempt * 5))
          done
          if [ "$pushed" -ne 1 ]; then
            echo "Failed to push profile traces after three attempts" >&2
            exit 1
          fi
          storage_sha="$(git rev-parse HEAD)"
          popd >/dev/null

          echo "## Perfetto profiles" >> "$GITHUB_STEP_SUMMARY"
          for trace in "${traces[@]}"; do
            filename="$(basename "$trace")"
            result_name="${filename#profile_}"
            result_name="${result_name%.trace.json.gz}"
            raw_url="https://raw.githubusercontent.com/SemiAnalysisAI/InferenceX-trace-storage/${storage_sha}/profiles/${SOURCE_SHA}/${result_name}/trace.json.gz"
            relay_url="$(python3 - "$raw_url" "$result_name" <<'PY'
          import sys
          import urllib.parse

          raw_url, title = sys.argv[1:]
          print(
              "https://semianalysisai.github.io/InferenceX-trace-storage/"
              f"?src={urllib.parse.quote(raw_url, safe='')}"
              f"&title={urllib.parse.quote(title, safe='')}"
          )
          PY
          )"
            printf -- "- [%s](%s)\n" "$result_name" "$relay_url" >> "$GITHUB_STEP_SUMMARY"
          done
