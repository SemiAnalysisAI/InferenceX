name: TRT Fixed-GBS Offline Benchmark
run-name: ${{ inputs.test-name || 'DeepSeek-V4 TRT Huawei-style offline' }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA containing the offline benchmark
        required: false
        type: string
        default: trt-bench
      hardware-profile:
        description: Offline hardware profile
        required: false
        type: choice
        options:
          - gb300
          - b300
        default: gb300
      test-name:
        description: Display name for this benchmark run
        required: false
        type: string
        default: DeepSeek-V4 GB300 TRT Huawei-style offline
      global_batch_sizes:
        description: Comma-separated Huawei global batches (16,64,128)
        required: false
        type: string
        default: 16,64,128
      salloc-time:
        description: Slurm allocation time limit in minutes
        required: false
        type: string
        default: "180"
      worker-timeout:
        description: Timeout in seconds for the fresh TRT engine
        required: false
        type: string
        default: "7200"
      worker-stack-period:
        description: TRT all-thread stack dump period; -1 disables it
        required: false
        type: string
        default: "-1"
      diagnostic-only:
        description: Print GB300 Slurm state without requesting GPUs
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prepare:
    if: ${{ !inputs.diagnostic-only }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      expected: ${{ steps.matrix.outputs.expected }}
    steps:
      - name: Validate fixed global batches
        id: matrix
        env:
          GLOBAL_BATCH_SIZES: ${{ inputs.global_batch_sizes }}
          HARDWARE_PROFILE: ${{ inputs.hardware-profile }}
        run: |
          python3 - <<'PY'
          import json
          import os

          hardware_profile = os.environ["HARDWARE_PROFILE"]
          if hardware_profile not in {"b300", "gb300"}:
              raise SystemExit(
                  f"Unsupported hardware profile: {hardware_profile}"
              )
          allowed = {16, 64, 128}
          values = [
              int(item.strip())
              for item in os.environ["GLOBAL_BATCH_SIZES"].split(",")
              if item.strip()
          ]
          if not values:
              raise SystemExit("At least one global batch size is required")
          if len(values) != len(set(values)):
              raise SystemExit(f"Duplicate global batch sizes: {values}")
          invalid = sorted(set(values) - allowed)
          if invalid:
              raise SystemExit(
                  f"Unsupported global batch sizes {invalid}; "
                  f"allowed={sorted(allowed)}"
              )
          matrix = [
              {
                  "id": f"gbs{value}",
                  "global_batch_size": value,
              }
              for value in values
          ]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(
                  "matrix=" + json.dumps(matrix, separators=(",", ":")) + "\n"
              )
              output.write(
                  "expected=" + ",".join(item["id"] for item in matrix) + "\n"
              )
          PY

  benchmark:
    needs: prepare
    runs-on:
      - self-hosted
      - ${{ inputs.hardware-profile == 'gb300' && 'gb300-nv' || 'b300' }}
    timeout-minutes: 240
    name: ${{ inputs.hardware-profile }} TRT offline / GBS ${{ matrix.global_batch_size }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      GLOBAL_BATCH_SIZE: ${{ matrix.global_batch_size }}
      BENCH_ID: ${{ matrix.id }}
      TRT_BENCH_HARDWARE_PROFILE: ${{ inputs.hardware-profile }}
      IMAGE: ${{ inputs.hardware-profile == 'gb300' && 'nvcr.io#nvidia/ai-dynamo/tensorrtllm-runtime:1.3.0-deepseek-v4-dev.1' || 'ghcr.io#semianalysisai/trtllm-deepseek-v4:feat-deepseek_v4-c185066' }}
      MODEL_PATH: /scratch/models/DeepSeek-V4-Pro
      DATASET_REVISION: 90f0394333616266d9fe85824ceaf505093cbaa5
      TRT_BENCH_CACHE_ROOT: ${{ inputs.hardware-profile == 'gb300' && '/data/home/sa-shared/gharunners/offline-trt/cache/dsv4-1.3.0-deepseek-v4-dev.1-sm100a' || '/data/trtllm-cache/dsv4-c185066-sm100a' }}
      SALLOC_TIME_LIMIT: ${{ inputs.salloc-time }}
      WORKER_TIMEOUT: ${{ inputs.worker-timeout }}
      TRTLLM_WORKER_PRINT_STACKS_PERIOD: ${{ inputs.worker-stack-period }}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPYCACHEPREFIX: /tmp/inferencex-offline-pycache
      TRT_BENCH_WORKSPACE: ${{ github.workspace }}/offline-bench
    steps:
      - name: Resource cleanup
        run: |
          if command -v scancel >/dev/null 2>&1; then
            scancel --name="${{ runner.name }}" || true
            while squeue --name="${{ runner.name }}" --noheader --format="%i" \
                | grep -q .; do
              squeue --name="${{ runner.name }}"
              sleep 5
            done
          fi
          mkdir -p "$TRT_BENCH_WORKSPACE"
          rm -f "$TRT_BENCH_WORKSPACE"/offline_result_*.json
          rm -f "$TRT_BENCH_WORKSPACE"/offline_controller_*.log
          rm -f "$TRT_BENCH_WORKSPACE"/offline_gpu_metrics_*.csv
          rm -f "$TRT_BENCH_WORKSPACE"/offline_rank_map_*.tsv
          rm -f "$TRT_BENCH_WORKSPACE"/offline_topology_*.log
          rm -f "$TRT_BENCH_WORKSPACE"/offline_allocation_*.log
          rm -f "$TRT_BENCH_WORKSPACE"/offline_completion_*.json
          rm -f "$TRT_BENCH_WORKSPACE"/offline_debug_*.tar.gz
          rm -rf "$TRT_BENCH_WORKSPACE"/.offline_work_*

      - name: Checkout benchmark branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 1
          ref: ${{ inputs.ref || github.ref_name }}
          path: offline-bench
          clean: false

      - name: Run fixed-global-batch benchmark
        working-directory: ${{ env.TRT_BENCH_WORKSPACE }}
        env:
          RUNNER_NAME: ${{ runner.name }}
        run: |
          if [[ "$TRT_BENCH_HARDWARE_PROFILE" == "gb300" ]]; then
            bash benchmarks/multi_node/offline/dsv4_fp4_gb300_trt.sh
          else
            bash benchmarks/single_node/offline/dsv4_fp4_b300_trt.sh
          fi

      - name: Show result headline
        if: always()
        working-directory: ${{ env.TRT_BENCH_WORKSPACE }}
        run: |
          result="offline_result_${BENCH_ID}.json"
          if [[ -f "$result" ]]; then
            jq '{
              status,
              benchmark: {
                hardware: .benchmark.hardware,
                hardware_profile: .benchmark.hardware_profile,
                effective_parallelism: .benchmark.effective_parallelism,
                global_batch_size: .benchmark.global_batch_size,
                local_batch_size: .benchmark.local_batch_size,
                active_gpu_count: .benchmark.active_gpu_count,
                max_num_tokens: .benchmark.max_num_tokens,
                engine_warmup_max_tokens: .benchmark.engine_warmup_max_tokens,
                warmup_decode_rounds: .benchmark.warmup_decode_rounds,
                measured_decode_rounds: .benchmark.measured_decode_rounds
              },
              aggregate: {
                decode_round_tpot_ms: .aggregate.decode_round_tpot_ms,
                decode_step_tput_per_gpu: .aggregate.decode_step_tput_per_gpu,
                observed_tokens_per_step: .aggregate.observed_tokens_per_step,
                output_tput_per_gpu: .aggregate.output_tput_per_gpu,
                wall_output_tput_per_gpu: .aggregate.wall_output_tput_per_gpu,
                filter: .aggregate.filter,
                schedule_validation: .aggregate.schedule_validation
              },
              huawei,
              failure_kind,
              error
            }' "$result"
          fi

      - name: Upload global-batch result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: offline-trt-job-${{ matrix.id }}
          path: |
            ${{ env.TRT_BENCH_WORKSPACE }}/offline_result_${{ matrix.id }}.json
            ${{ env.TRT_BENCH_WORKSPACE }}/offline_controller_${{ matrix.id }}.log
            ${{ env.TRT_BENCH_WORKSPACE }}/offline_gpu_metrics_${{ matrix.id }}.csv
            ${{ env.TRT_BENCH_WORKSPACE }}/offline_gpu_metrics_${{ matrix.id }}_*.csv
            ${{ env.TRT_BENCH_WORKSPACE }}/offline_rank_map_${{ matrix.id }}.tsv
            ${{ env.TRT_BENCH_WORKSPACE }}/offline_topology_${{ matrix.id }}.log
            ${{ env.TRT_BENCH_WORKSPACE }}/offline_allocation_${{ matrix.id }}.log
            ${{ env.TRT_BENCH_WORKSPACE }}/offline_completion_${{ matrix.id }}.json
            ${{ env.TRT_BENCH_WORKSPACE }}/offline_debug_${{ matrix.id }}.tar.gz
          if-no-files-found: warn
          retention-days: 14

      - name: Release Slurm allocation
        if: always()
        run: |
          if command -v scancel >/dev/null 2>&1; then
            scancel --name="${{ runner.name }}" || true
          fi

  collect-results:
    needs: [prepare, benchmark]
    if: ${{ always() && !inputs.diagnostic-only }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout benchmark branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref_name }}
          clean: true

      - name: Download per-global-batch results
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: offline-trt-job-*
          path: downloaded-offline-results
          merge-multiple: true

      - name: Build offline summary
        env:
          EXPECTED: ${{ needs.prepare.outputs.expected }}
        run: |
          mkdir -p downloaded-offline-results
          python3 utils/bench_offline/summarize.py \
            --results-dir downloaded-offline-results \
            --expected "$EXPECTED" \
            --json-out offline_aggregate.json \
            --markdown-out offline_summary.md \
            --renderer-json-out agg_bmk.json
          cat offline_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregate result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: offline-trt-summary
          path: |
            offline_aggregate.json
            offline_summary.md
            agg_bmk.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload renderer-compatible result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: results_bmk
          path: agg_bmk.json
          if-no-files-found: warn
          retention-days: 30

  gb300-status:
    if: ${{ inputs.diagnostic-only }}
    runs-on:
      - self-hosted
      - ${{ inputs.hardware-profile == 'gb300' && 'gb300-nv' || 'gb300-nv' }}
    timeout-minutes: 5
    steps:
      - name: Show GB300 Slurm state
        run: |
          set -Eeuo pipefail
          date -u '+timestamp=%Y-%m-%dT%H:%M:%SZ'
          printf 'runner=%s host=%s\n' '${{ runner.name }}' "$(hostname)"
          echo '--- target offline job ---'
          squeue \
            --name=gb300-nv_2 \
            --format='%.18i %.10T %.10M %.10l %.6D %.30R %.40j'
          job_id="$(
            squeue \
              --name=gb300-nv_2 \
              --noheader \
              --format='%i' \
              | head -n 1
          )"
          if [[ -n "$job_id" ]]; then
            echo '--- target job details ---'
            job_record="$(scontrol show job --oneliner "$job_id")"
            printf '%s\n' "$job_record"
            echo '--- target job steps ---'
            squeue \
              --steps \
              --jobs="$job_id" \
              --format='%.24i %.10T %.10M %.6D %.30R %.40j' \
              || true
            echo '--- target job accounting ---'
            sstat \
              --allsteps \
              --jobs="$job_id" \
              --format='JobID,NTasks,MaxRSS,AveRSS,AveCPU,NodeList' \
              || true

            work_dir="$(
              sed -n 's/.* WorkDir=\([^ ]*\).*/\1/p' <<<"$job_record"
            )"
            if [[ -n "$work_dir" && -d "$work_dir" ]]; then
              echo "--- shared artifacts: $work_dir ---"
              find "$work_dir" \
                -maxdepth 2 \
                -type f \
                \( -name 'offline_*' -o -name 'worker.log' \
                   -o -name 'perfect_router.jsonl' \) \
                -printf '%TY-%Tm-%TdT%TH:%TM:%TS %12s %p\n' \
                | sort
              for log_path in \
                "$work_dir/offline_controller_gbs16.log" \
                "$work_dir/.offline_work_gbs16_${job_id}/worker.log" \
                "$work_dir/.offline_work_gbs16_${job_id}/perfect_router.jsonl"
              do
                if [[ -f "$log_path" ]]; then
                  echo "--- tail: $log_path ---"
                  tail -n 120 "$log_path"
                fi
              done
            fi
          fi
          echo '--- batch_1 queue ---'
          squeue \
            --partition=batch_1 \
            --format='%.18i %.10T %.10M %.10l %.6D %.30R %.40j'
          echo '--- predicted starts ---'
          squeue \
            --partition=batch_1 \
            --start \
            --format='%.18i %.10T %.19S %.6D %.30R %.40j'
          echo '--- node state ---'
          sinfo \
            --partition=batch_1 \
            --Node \
            --format='%20N %10T %8c %12G'
