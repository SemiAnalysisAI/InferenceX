name: "Experimental: GPTOss H100 Power Sweep"
run-name: "Experimental: gptoss h100 power sweep — 22 configs"

on:
  workflow_dispatch:

env:
  RANDOM_RANGE_RATIO: "0.8"
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  HF_HUB_CACHE: '/mnt/hf_hub_cache/'
  MODEL: "openai/gpt-oss-120b"
  MODEL_PREFIX: "gptoss-power"
  MAX_MODEL_LEN: "10240"
  IMAGE: "vllm/vllm-openai:v0.15.1"
  FRAMEWORK: "vllm"
  PRECISION: "fp4"
  EP_SIZE: "0"
  DP_ATTENTION: "false"
  SPEC_DECODING: "none"
  DISAGG: "none"
  RUN_EVAL: "false"

permissions:
  contents: read

jobs:
  benchmark-power:
    runs-on: h100
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          # ── 1k/1k: TP8 conc 4,8,16,32,64 | TP4 conc 64 | TP2 conc 64 ──
          - { isl: "1024", osl: "1024", isl_osl: "1k1k", tp: "8", conc: "4" }
          - { isl: "1024", osl: "1024", isl_osl: "1k1k", tp: "8", conc: "8" }
          - { isl: "1024", osl: "1024", isl_osl: "1k1k", tp: "8", conc: "16" }
          - { isl: "1024", osl: "1024", isl_osl: "1k1k", tp: "8", conc: "32" }
          - { isl: "1024", osl: "1024", isl_osl: "1k1k", tp: "8", conc: "64" }
          - { isl: "1024", osl: "1024", isl_osl: "1k1k", tp: "4", conc: "64" }
          - { isl: "1024", osl: "1024", isl_osl: "1k1k", tp: "2", conc: "64" }
          # ── 1k/8k: TP8 conc 4,8,16,32,64 | TP4 conc 64 | TP2 conc 64 ──
          - { isl: "1024", osl: "8192", isl_osl: "1k8k", tp: "8", conc: "4" }
          - { isl: "1024", osl: "8192", isl_osl: "1k8k", tp: "8", conc: "8" }
          - { isl: "1024", osl: "8192", isl_osl: "1k8k", tp: "8", conc: "16" }
          - { isl: "1024", osl: "8192", isl_osl: "1k8k", tp: "8", conc: "32" }
          - { isl: "1024", osl: "8192", isl_osl: "1k8k", tp: "8", conc: "64" }
          - { isl: "1024", osl: "8192", isl_osl: "1k8k", tp: "4", conc: "64" }
          - { isl: "1024", osl: "8192", isl_osl: "1k8k", tp: "2", conc: "64" }
          # ── 8k/1k: TP8 conc 4,8 | TP4 conc 4,8,16,32,64 | TP2 conc 64 ──
          - { isl: "8192", osl: "1024", isl_osl: "8k1k", tp: "8", conc: "4" }
          - { isl: "8192", osl: "1024", isl_osl: "8k1k", tp: "8", conc: "8" }
          - { isl: "8192", osl: "1024", isl_osl: "8k1k", tp: "4", conc: "4" }
          - { isl: "8192", osl: "1024", isl_osl: "8k1k", tp: "4", conc: "8" }
          - { isl: "8192", osl: "1024", isl_osl: "8k1k", tp: "4", conc: "16" }
          - { isl: "8192", osl: "1024", isl_osl: "8k1k", tp: "4", conc: "32" }
          - { isl: "8192", osl: "1024", isl_osl: "8k1k", tp: "4", conc: "64" }
          - { isl: "8192", osl: "1024", isl_osl: "8k1k", tp: "2", conc: "64" }
    name: "${{ matrix.isl_osl }} tp${{ matrix.tp }} conc${{ matrix.conc }}"
    env:
      ISL: ${{ matrix.isl }}
      OSL: ${{ matrix.osl }}
      TP: ${{ matrix.tp }}
      CONC: ${{ matrix.conc }}
      EXP_NAME: "gptoss-power_${{ matrix.isl_osl }}"
    steps:
      - name: Resource cleanup (pre-run)
        run: |
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            echo "[Docker] Cleaning up resources ..."
            docker ps -aq | xargs -r docker rm -f
            docker network prune -f
            while [ -n "$(docker ps -aq)" ]; do
              docker ps -a
              sleep 5
            done
          fi
          if command -v squeue >/dev/null 2>&1; then
            if [[ "${{ runner.name }}" == h100-dgxc-slurm* ]]; then
              echo "[Slurm] Cleaning up jobs with name: ${{ runner.name }} ..."
              scancel --name="${{ runner.name }}" || true
              while [ -n "$(squeue --name='${{ runner.name }}' --noheader --format='%i')" ]; do
                squeue --name="${{ runner.name }}"
                sleep 5
              done
            else
              echo "[Slurm] Cleaning up jobs for user: $USER ..."
              scancel -u "$USER" || true
              while [ -n "$(squeue -u "$USER" --noheader --format='%i')" ]; do
                squeue -u "$USER"
                sleep 5
              done
            fi
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0

      - name: Set result filename
        run: |
          RESULT_FILENAME="gptoss-power_${{ matrix.isl_osl }}_fp4_vllm_tp${TP}-ep0-dpafalse_disagg-none_spec-none_conc${CONC}_${{ runner.name }}"
          echo "RESULT_FILENAME=${RESULT_FILENAME}" >> $GITHUB_ENV
          echo "Config: ${{ matrix.isl_osl }} | TP=${TP} | CONC=${CONC}"
          echo "Result filename: ${RESULT_FILENAME}"

      - name: Launch benchmark with power monitoring
        env:
          RUNNER_NAME: ${{ runner.name }}
          RUNNER_TYPE: h100
        run: |
          bash ./runners/launch_${RUNNER_NAME%%_*}.sh

          FOUND_RESULT_FILE=
          for i in {1..10}; do
            if [ -f "$RESULT_FILENAME.json" ]; then
              FOUND_RESULT_FILE=true
              break
            fi
            echo "Waiting for result file... (attempt $i)"
            sleep 1
          done

          if [ -z "$FOUND_RESULT_FILE" ]; then
            echo "Run failed: Benchmark result $RESULT_FILENAME.json not found." >&2
            exit 1
          fi

      - name: Process result
        env:
          RUNNER_TYPE: h100
        run: python3 utils/process_result.py

      - name: Upload benchmark result
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: bmk_${{ env.RESULT_FILENAME }}
          path: agg_${{ env.RESULT_FILENAME }}.json

      - name: Upload GPU power CSV
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: gpu_power_${{ env.RESULT_FILENAME }}
          path: gpu_power.csv
          if-no-files-found: warn

      - name: Generate power graphs
        if: always()
        run: |
          if [ -f gpu_power.csv ]; then
            pip install -q matplotlib pandas numpy
            mkdir -p power_plots
            python3 utils/plot_gpu_power.py gpu_power.csv \
              --output-dir power_plots \
              --title "gptoss fp4 h100 ${{ matrix.isl_osl }} tp${{ matrix.tp }} conc${{ matrix.conc }}"
          else
            echo "No gpu_power.csv found — skipping graph generation"
          fi

      - name: Upload power graphs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: power_graphs_${{ env.RESULT_FILENAME }}
          path: power_plots/
          if-no-files-found: ignore

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: server_logs_${{ env.RESULT_FILENAME }}
          path: server.log
          if-no-files-found: ignore

      - name: Resource cleanup (post-run)
        if: always()
        run: |
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            echo "[Docker] Cleaning up resources ..."
            docker ps -aq | xargs -r docker rm -f
            docker network prune -f
            while [ -n "$(docker ps -aq)" ]; do
              docker ps -a
              sleep 5
            done
          fi
          if command -v squeue >/dev/null 2>&1; then
            if [[ "${{ runner.name }}" == h100-dgxc-slurm* ]]; then
              echo "[Slurm] Cleaning up jobs with name: ${{ runner.name }} ..."
              scancel --name="${{ runner.name }}" || true
              while [ -n "$(squeue --name='${{ runner.name }}' --noheader --format='%i')" ]; do
                squeue --name="${{ runner.name }}"
                sleep 5
              done
            else
              echo "[Slurm] Cleaning up jobs for user: $USER ..."
              scancel -u "$USER" || true
              while [ -n "$(squeue -u "$USER" --noheader --format='%i')" ]; do
                squeue -u "$USER"
                sleep 5
              done
            fi
          fi
