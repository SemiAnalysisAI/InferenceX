name: slurm-probe

# Diagnostic: run `squeue` directly on an NVIDIA runner and print it to the
# GitHub logs. This is a PLAIN job, so it does NOT include the wedge-prone
# "Slurm cleanup (pre-run)" step (that only lives in the benchmark template) â€”
# it just lands on the runner and dumps the Slurm queue. Gives us cluster
# visibility via the runner, no SSH needed.

on:
  push:
    branches: [chore/slurm-probe]
  workflow_dispatch:
    inputs:
      runner:
        description: "runner label to probe (e.g. gb300-nv, gb200-nv)"
        default: gb300-nv

jobs:
  probe:
    runs-on: ${{ github.event.inputs.runner || 'gb300-nv' }}
    timeout-minutes: 5
    steps:
      - name: isolate pre-run cleanup wedge
        run: |
          set +e
          run_probe() {
            label="$1"
            shift
            echo "=== BEGIN ${label} utc=$(date -u +%FT%TZ) ==="
            start=$SECONDS
            timeout --kill-after=3s 10s "$@"
            rc=$?
            echo "=== END ${label} rc=${rc} elapsed=$((SECONDS - start))s utc=$(date -u +%FT%TZ) ==="
            echo
          }

          echo "=== runner=$RUNNER_NAME host=$(hostname -f 2>/dev/null || hostname) utc=$(date -u +%FT%TZ) ==="
          echo "workspace=$GITHUB_WORKSPACE"
          echo "user=$(id)"
          echo

          echo "=== pre-existing blocked cleanup processes ==="
          ps -eo user,euser,stat,wchan:32,etime,pid,ppid,comm,args | \
            awk 'NR == 1 || $3 ~ /^D/ || $0 ~ /(squeue|scancel|sudo rm|rm -rf).*benchmark_logs/'
          echo

          stuck_sudo_pid=$(pgrep -o -x sudo || true)
          if [ -n "$stuck_sudo_pid" ]; then
            echo "=== oldest sudo process: pid=$stuck_sudo_pid ==="
            ps -o user,euser,group,egroup,stat,wchan:32,etime,pid,ppid,comm,args -p "$stuck_sudo_pid"
            cat "/proc/$stuck_sudo_pid/status" 2>&1 || true
            echo "wchan=$(cat "/proc/$stuck_sudo_pid/wchan" 2>&1)"
            echo "syscall=$(cat "/proc/$stuck_sudo_pid/syscall" 2>&1)"
            echo "children=$(cat "/proc/$stuck_sudo_pid/task/$stuck_sudo_pid/children" 2>&1)"
            ls -la "/proc/$stuck_sudo_pid/fd" 2>&1 || true
            command -v pstree >/dev/null && pstree -aps "$stuck_sudo_pid" 2>&1 || true
            echo
          fi

          echo "=== sudo / NSS / PAM configuration visible without privilege ==="
          for config in /etc/sudo.conf /etc/nsswitch.conf /etc/pam.d/sudo /etc/resolv.conf; do
            echo "--- $config ---"
            sed -n '1,240p' "$config" 2>&1 || true
          done
          echo

          run_probe "getent-runner-user" getent passwd "$(id -un)"
          run_probe "getent-runner-group" getent group "$(id -gn)"
          run_probe "getent-hostname" getent hosts "$(hostname -f 2>/dev/null || hostname)"
          run_probe "sudo-version" sudo -V
          run_probe "sudo-list-policy" sudo -n -l

          run_probe "squeue-by-runner" squeue --name="$RUNNER_NAME" --noheader --format=%i
          run_probe "full-squeue" squeue
          run_probe "completing-jobs" squeue --states=CG,CF,CD --noheader

          echo "=== workspace mount candidates (read from /proc; no mount traversal) ==="
          awk -v p="$GITHUB_WORKSPACE" '$2 == p || index(p, $2 "/") == 1 {print}' /proc/mounts
          echo

          run_probe "findmnt-workspace" findmnt -T "$GITHUB_WORKSPACE" -o TARGET,SOURCE,FSTYPE,OPTIONS
          run_probe "stat-workspace" stat "$GITHUB_WORKSPACE"
          run_probe "sudo-noninteractive" sudo -n true
          run_probe "stat-benchmark-logs" sudo -n stat "$GITHUB_WORKSPACE/benchmark_logs"
          run_probe "safe-rm-nonexistent" sudo -n rm -rf "$GITHUB_WORKSPACE/.slurm-probe-nonexistent-$GITHUB_RUN_ID"

          echo "=== benchmark_logs traversal is last: a stale NFS inode may be unkillable ==="
          run_probe "find-benchmark-logs" sudo -n find "$GITHUB_WORKSPACE/benchmark_logs" -maxdepth 3 -printf '%y %p\n'

          echo "=== final blocked-process snapshot ==="
          ps -eo user,euser,stat,wchan:32,etime,pid,ppid,comm,args | \
            awk 'NR == 1 || $3 ~ /^D/ || $0 ~ /(squeue|scancel|sudo rm|rm -rf).*benchmark_logs/'
          echo
          echo "=== done utc=$(date -u +%FT%TZ) ==="
