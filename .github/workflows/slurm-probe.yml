name: slurm-probe

on:
  push:
    branches: [chore/slurm-probe]
  workflow_dispatch:
    inputs:
      runner:
        description: "runner label to probe"
        default: gb200
      jobid:
        description: "slurm job id to sacct"
        default: "19603"

jobs:
  probe:
    runs-on: ${{ github.event.inputs.runner || 'gb200' }}
    timeout-minutes: 5
    steps:
      - name: sacct gb200 job + partition/preempt limits
        run: |
          set +e
          JOBID="${{ github.event.inputs.jobid || '19603' }}"
          echo "runner=$RUNNER_NAME host=$(hostname -f 2>/dev/null || hostname) utc=$(date -u +%FT%TZ)"
          echo "querying slurm job $JOBID"
          echo

          echo "=== sacct: why did job $JOBID end? (State / Reason / Timelimit / Elapsed) ==="
          sacct -j "$JOBID" --format=JobID,JobName%28,State%20,Reason%24,Timelimit,Elapsed,Start,End,ExitCode,NodeList%24 2>&1 | head -40
          echo
          echo "=== sacct parsable (full state+reason, no truncation) ==="
          sacct -j "$JOBID" -P --format=JobID,JobName,State,Reason,Timelimit,Elapsed,ExitCode,DerivedExitCode 2>&1 | head -20
          echo

          echo "=== recent gb200/dsr1 jobs (pattern over last 3h) ==="
          sacct -X --starttime now-3hours --format=JobID,JobName%28,State%18,Timelimit,Elapsed,End 2>&1 | grep -iE "gb200|dsr1|JobID|State|PREEMPT|TIMEOUT|CANCEL" | head -25
          echo

          echo "=== partition default/max time + preempt mode (is there a ~12min cap?) ==="
          scontrol show partition 2>&1 | grep -iE "PartitionName|DefaultTime|MaxTime|PreemptMode|GraceTime|QoS" | head -50
          echo

          echo "=== cluster-wide preemption policy ==="
          scontrol show config 2>&1 | grep -iE "PreemptType|PreemptMode|PreemptExemptTime|KillWait|OverTimeLimit|GraceTime" | head
          echo

          echo "=== squeue now: what is contending on this cluster ==="
          timeout 15 squeue -o "%.10i %.34j %.10u %.2t %.10M %.10l %.6D %.20R" 2>&1 | head -40
