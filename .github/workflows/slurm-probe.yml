name: slurm-probe

on:
  push:
    branches: [chore/slurm-probe]
  workflow_dispatch:
    inputs:
      runner:
        description: "runner label to probe"
        default: gb300-nv

jobs:
  probe:
    runs-on: ${{ github.event.inputs.runner || 'gb300-nv' }}
    timeout-minutes: 3
    steps:
      - name: inspect SSSD sudo responder evidence
        run: |
          set +e
          echo "runner=$RUNNER_NAME host=$(hostname -f 2>/dev/null || hostname) utc=$(date -u +%FT%TZ)"
          echo

          echo "=== stuck sudo cleanup count and oldest entries ==="
          ps -eo user,euser,stat,wchan:32,etime,pid,ppid,comm,args |
            awk '$0 ~ /sudo rm -rf .*benchmark_logs/ || NR == 1' |
            sort -k5,5r | head -40
          echo

          echo "=== SSSD sudo socket state ==="
          ss -xap 2>&1 | grep -E 'sss|sudo' || true
          echo

          echo "=== SSSD process state ==="
          ps -eo user,euser,stat,wchan:32,etime,pid,ppid,comm,args |
            awk 'NR == 1 || $0 ~ /[s]ssd/'
          echo

          echo "=== SSSD logs and permissions ==="
          ls -la /var/log/sssd 2>&1 || true
          for log in /var/log/sssd/sssd_sudo.log /var/log/sssd/sssd_gb300.internal.log; do
            echo "--- $log ---"
            tail -200 "$log" 2>&1 || true
          done
          echo

          echo "=== system journal (if runner account may read it) ==="
          journalctl -u sssd --since '2026-06-01' --no-pager -n 200 2>&1 || true
          echo

          echo "=== sudo responder proc state (if visible) ==="
          sudo_responder_pid=$(pgrep -x sssd_sudo | head -1)
          if [ -n "$sudo_responder_pid" ]; then
            cat "/proc/$sudo_responder_pid/status" 2>&1 || true
            echo "wchan=$(cat "/proc/$sudo_responder_pid/wchan" 2>&1)"
            echo "syscall=$(cat "/proc/$sudo_responder_pid/syscall" 2>&1)"
            command -v pstree >/dev/null && pstree -aps "$sudo_responder_pid" 2>&1 || true
          fi
