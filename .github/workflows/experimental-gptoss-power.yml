name: "Experimental: GPTOss H100 Power Monitor"
run-name: "Experimental: gptoss-fp4-h100-vllm 1k8k power monitor | tp=${{ inputs.tp }} conc=${{ inputs.conc }}"

on:
  workflow_dispatch:
    inputs:
      tp:
        description: "Tensor parallelism"
        required: false
        default: "4"
        type: string
      conc:
        description: "Concurrency"
        required: false
        default: "4"
        type: string

env:
  RANDOM_RANGE_RATIO: "0.8"
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  HF_HUB_CACHE: '/mnt/hf_hub_cache/'
  EXP_NAME: "gptoss-power_1k8k"
  MODEL: "openai/gpt-oss-120b"
  MODEL_PREFIX: "gptoss-power"
  ISL: "1024"
  OSL: "8192"
  MAX_MODEL_LEN: "10240"
  IMAGE: "vllm/vllm-openai:v0.15.1"
  FRAMEWORK: "vllm"
  PRECISION: "fp4"
  TP: ${{ inputs.tp || '4' }}
  EP_SIZE: "0"
  DP_ATTENTION: "false"
  CONC: ${{ inputs.conc || '4' }}
  SPEC_DECODING: "none"
  DISAGG: "none"
  RUN_EVAL: "false"

permissions:
  contents: read

jobs:
  benchmark-power:
    runs-on: h100
    timeout-minutes: 240
    name: "gptoss fp4 h100 vllm 1k8k | tp=${{ inputs.tp || '4' }} conc=${{ inputs.conc || '4' }} | power monitoring"
    steps:
      - name: Resource cleanup (pre-run)
        run: |
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            echo "[Docker] Cleaning up resources ..."
            docker ps -aq | xargs -r docker rm -f
            docker network prune -f
            while [ -n "$(docker ps -aq)" ]; do
              docker ps -a
              sleep 5
            done
          fi
          if command -v squeue >/dev/null 2>&1; then
            if [[ "${{ runner.name }}" == h100-dgxc-slurm* ]]; then
              echo "[Slurm] Cleaning up jobs with name: ${{ runner.name }} ..."
              scancel --name="${{ runner.name }}" || true
              while [ -n "$(squeue --name='${{ runner.name }}' --noheader --format='%i')" ]; do
                squeue --name="${{ runner.name }}"
                sleep 5
              done
            else
              echo "[Slurm] Cleaning up jobs for user: $USER ..."
              scancel -u "$USER" || true
              while [ -n "$(squeue -u "$USER" --noheader --format='%i')" ]; do
                squeue -u "$USER"
                sleep 5
              done
            fi
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0

      - name: Launch benchmark with power monitoring
        env:
          RUNNER_NAME: ${{ runner.name }}
          RUNNER_TYPE: h100
          RESULT_FILENAME: "gptoss-power_fp4_vllm_tp${{ env.TP }}-ep0-dpafalse_disagg-none_spec-none_conc${{ env.CONC }}_${{ runner.name }}"
        run: |
          echo "RESULT_FILENAME=${RESULT_FILENAME}" >> $GITHUB_ENV

          bash ./runners/launch_${RUNNER_NAME%%_*}.sh

          FOUND_RESULT_FILE=
          for i in {1..10}; do
            if [ -f "$RESULT_FILENAME.json" ]; then
              FOUND_RESULT_FILE=true
              break
            fi
            echo "Waiting for result file... (attempt $i)"
            sleep 1
          done

          if [ -z "$FOUND_RESULT_FILE" ]; then
            echo "Run failed: Benchmark result $RESULT_FILENAME.json not found." >&2
            exit 1
          fi

      - name: Process result
        env:
          RUNNER_TYPE: h100
        run: python3 utils/process_result.py

      - name: Upload benchmark result
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: bmk_${{ env.RESULT_FILENAME }}
          path: agg_${{ env.RESULT_FILENAME }}.json

      - name: Upload GPU power CSV
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: gpu_power_gptoss_fp4_h100_1k8k
          path: gpu_power.csv
          if-no-files-found: warn

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: server_logs_${{ env.RESULT_FILENAME }}
          path: server.log
          if-no-files-found: ignore

      - name: Resource cleanup (post-run)
        if: always()
        run: |
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            echo "[Docker] Cleaning up resources ..."
            docker ps -aq | xargs -r docker rm -f
            docker network prune -f
            while [ -n "$(docker ps -aq)" ]; do
              docker ps -a
              sleep 5
            done
          fi
          if command -v squeue >/dev/null 2>&1; then
            if [[ "${{ runner.name }}" == h100-dgxc-slurm* ]]; then
              echo "[Slurm] Cleaning up jobs with name: ${{ runner.name }} ..."
              scancel --name="${{ runner.name }}" || true
              while [ -n "$(squeue --name='${{ runner.name }}' --noheader --format='%i')" ]; do
                squeue --name="${{ runner.name }}"
                sleep 5
              done
            else
              echo "[Slurm] Cleaning up jobs for user: $USER ..."
              scancel -u "$USER" || true
              while [ -n "$(squeue -u "$USER" --noheader --format='%i')" ]; do
                squeue -u "$USER"
                sleep 5
              done
            fi
          fi
