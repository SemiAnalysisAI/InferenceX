# CollectiveX Sweep — one structured run instead of thousands of dispatches.
#
# Shape: setup resolves the suites into a shard matrix, then one GPU cell runs per
# shard, executes the benchmark, validates the emitted neutral artifacts, and uploads
# them. This repo only schedules, executes, validates, and uploads — it does not
# promote, rank, recommend, or decide what a frontend displays. This file is registered
# on the default branch, so its collectivex branch revision can be dispatched with --ref.
name: CollectiveX Sweep
permissions:
  actions: read
  contents: read
on:
  workflow_dispatch:
    inputs:
      backend:
        description: "EP library to sweep — 'all' runs every EP backend in one matrix"
        type: choice
        default: all
        options: [all, deepep, deepep-v2, uccl, deepep-hybrid, mori, nccl-ep]
      suites:
        description: "'all' or comma-list of suite names"
        type: string
        default: all
      only_sku:
        description: Restrict to one GHA runner pool (h100-dgxc|h200-dgxc|b300|b200-dgxc|gb200|gb300|mi300x|mi355x); blank = all
        type: string
        default: ''
      exclude_skus:
        description: Comma-list of runner pools to drop from the matrix (partial run, e.g. b300); disjoint from only_sku; blank = none
        type: string
        default: ''
      ep_sizes:
        description: Keep only shards whose expert-parallel degree is in this comma-list (8 keeps EP8 only, dropping EP16 so GB SKUs co-schedule with 8-GPU SKUs; blank = all)
        type: string
        default: ''
concurrency:
  group: cx-${{ github.ref }}-${{ inputs.backend }}-${{ inputs.only_sku }}
  cancel-in-progress: false

jobs:
  # ---- setup: resolve the suites into the shard matrix (the "pending jobs" node) ----
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      n: ${{ steps.gen.outputs.n }}
      max_parallel: ${{ steps.gen.outputs.max_parallel }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0
        with: { clean: true, persist-credentials: false }
      - name: Install matrix dependencies
        run: python3 -m pip install --quiet PyYAML==6.0.2
      - id: gen
        working-directory: experimental/CollectiveX
        env:
          INPUT_BACKEND: ${{ inputs.backend }}
          INPUT_SUITES: ${{ inputs.suites }}
          INPUT_ONLY_SKU: ${{ inputs.only_sku }}
          INPUT_EXCLUDE_SKUS: ${{ inputs.exclude_skus }}
          INPUT_EP_SIZES: ${{ inputs.ep_sizes }}
          COLLECTIVEX_SOURCE_SHA: ${{ github.sha }}
          COLLECTIVEX_ARTIFACT_NAME: cxunsupported-${{ github.run_id }}-${{ github.run_attempt }}
          COLLECTIVEX_EXECUTION_ID: ${{ github.run_id }}_${{ github.run_attempt }}_unsupported
        run: |
          set -euo pipefail
          args=(--suites "$INPUT_SUITES")
          case "$INPUT_BACKEND" in
            all) args+=(--backends all) ;;
            *) args+=(--backend "$INPUT_BACKEND") ;;
          esac
          [ -n "$INPUT_ONLY_SKU" ] && args+=(--only-sku "$INPUT_ONLY_SKU")
          [ -n "$INPUT_EXCLUDE_SKUS" ] && args+=(--exclude-skus "$INPUT_EXCLUDE_SKUS")
          [ -n "$INPUT_EP_SIZES" ] && args+=(--ep-sizes "$INPUT_EP_SIZES")
          python3 sweep_matrix.py "${args[@]}" --out matrix_full.json >/dev/null
          SLIM=$(python3 -c "import json;m=json.load(open('matrix_full.json'));print(json.dumps({'include':[{k:v for k,v in x.items() if k!='case_ids'} for x in m['include']]}))")
          {
            echo "matrix=$SLIM"
            echo "n=$(python3 -c "import json;print(len(json.load(open('matrix_full.json'))['include']))")"
            echo "source_backends=$(python3 -c "import json;m=json.load(open('matrix_full.json'));print(' '.join(sorted({x['backend'] for x in m['include']} & {'deepep-v2','deepep-hybrid'})))")"
            echo "max_parallel=$(python3 -c "import json;m=json.load(open('matrix_full.json'));w=max(x['execution_weight'] for x in m['include']);print(max(1,min(10,4096//w)))")"
          } >> "$GITHUB_OUTPUT"
          unsupported_n=$(python3 -c "import json;m=json.load(open('matrix_full.json'));print(sum(x['disposition']=='unsupported' for x in m['requested_cases']))")
          echo "unsupported_n=$unsupported_n" >> "$GITHUB_OUTPUT"
          if [ "$unsupported_n" -gt 0 ]; then
            python3 sweep_matrix.py --emit-unsupported-from matrix_full.json \
              --out-dir unsupported
          fi
          python3 -c "import json;m=json.load(open('matrix_full.json'));print('execution-cells:',len(m['include']))"
      - name: Prepare pinned backend source archive
        if: ${{ steps.gen.outputs.source_backends != '' }}
        working-directory: experimental/CollectiveX
        env:
          SOURCE_BACKENDS: ${{ steps.gen.outputs.source_backends }}
          COLLECTIVEX_EXECUTION_ID: ${{ github.run_id }}_${{ github.run_attempt }}_sources
        run: |
          set -euo pipefail
          source runtime/common.sh
          work="$RUNNER_TEMP/collectivex-backend-sources"
          archive="$RUNNER_TEMP/collectivex-backend-sources.tar"
          rm -rf -- "$work" "$archive"
          umask 077
          mkdir -m 700 "$work"
          mkdir -p "$work/experimental/CollectiveX"
          read -r -a backends <<< "$SOURCE_BACKENDS"
          [ "${#backends[@]}" -gt 0 ]
          source_root="$work/experimental/CollectiveX/.cx_sources"
          members=()
          for backend in "${backends[@]}"; do
            cx_prepare_backend_source "$work" "$backend"
            source_path="$(cx_backend_source_path "$source_root" "$backend")"
            source_basename="${source_path#"$source_root/"}"
            [ -n "$source_basename" ] \
              && [ "$source_path" = "$source_root/$source_basename" ] \
              && [[ "$source_basename" != */* ]]
            members+=(".cx_sources/$source_basename")
          done
          cx_cleanup_private_logs 0
          tar --sort=name --mtime='@1' --owner=0 --group=0 --numeric-owner \
            --no-recursion -C "$work/experimental/CollectiveX" \
            -cf "$archive" .cx_sources
          for member in "${members[@]}"; do
            tar --sort=name --mtime='@1' --owner=0 --group=0 --numeric-owner \
              -C "$work/experimental/CollectiveX" -rf "$archive" "$member"
          done
          sha256sum "$archive"
          rm -rf -- "$work"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ steps.gen.outputs.source_backends != '' }}
        with:
          name: cxbackend-sources-${{ github.run_id }}
          path: ${{ runner.temp }}/collectivex-backend-sources.tar
          if-no-files-found: error
          overwrite: true
          retention-days: 14
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cxsweep-matrix-${{ github.run_id }}
          path: experimental/CollectiveX/matrix_full.json
          if-no-files-found: error
          overwrite: true
          retention-days: 14
      - name: Validate unsupported outcomes
        id: unsupported_contracts
        if: ${{ always() && fromJSON(steps.gen.outputs.unsupported_n) > 0 }}
        env:
          COLLECTIVEX_ARTIFACT_NAME: cxunsupported-${{ github.run_id }}-${{ github.run_attempt }}
          COLLECTIVEX_EXECUTION_ID: ${{ github.run_id }}_${{ github.run_attempt }}_unsupported
        run: |
          python3 experimental/CollectiveX/contracts.py validate-delivery \
            --source experimental/CollectiveX/matrix_full.json \
            --disposition unsupported \
            experimental/CollectiveX/unsupported/*.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && fromJSON(steps.gen.outputs.unsupported_n) > 0 && steps.unsupported_contracts.outcome == 'success' }}
        with:
          name: cxunsupported-${{ github.run_id }}-${{ github.run_attempt }}
          path: experimental/CollectiveX/unsupported/*.json
          if-no-files-found: error
          retention-days: 14

  # ---- sweep: ONE matrix cell per shard (the parent job with child jobs) ----
  sweep:
    needs: setup
    if: ${{ fromJSON(needs.setup.outputs.n) > 0 }}
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.setup.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.sku }}
    timeout-minutes: 350
    env:
      CX_BENCH: ${{ matrix.backend }}
      CX_NODES: ${{ matrix.nodes }}
      CX_GPUS_PER_NODE: ${{ matrix.gpus_per_node }}
      CX_SCALE_UP_DOMAIN: ${{ matrix.scale_up_domain }}
      CX_SHARD_FILE: .shards/${{ matrix.id }}.json
      CX_SHARD_SKU: ${{ matrix.sku }}
      COLLECTIVEX_CANONICAL_GHA: '1'
      COLLECTIVEX_SOURCE_SHA: ${{ github.sha }}
      COLLECTIVEX_ARTIFACT_NAME: ${{ format('cxshard-{0}-{1}-{2}', matrix.id, github.run_id, github.run_attempt) }}
      # Consolidated shards run one bounded build-group in one Slurm allocation.
      # MI300X's compute partition has a 180-minute ceiling; the other production
      # pools accept 300 minutes. Allocations release as soon as the shard finishes.
      CX_TIME: ${{ matrix.sku == 'mi300x' && '180' || '300' }}
      COLLECTIVEX_EXECUTION_ID: ${{ github.run_id }}_${{ github.run_attempt }}_${{ matrix.id }}
      CX_JOB_PARENT: ${{ matrix.launcher == 'mi-amds' && format('/tmp/inferencex-collectivex-parent-{0}-{1}-{2}', github.run_id, github.run_attempt, matrix.id) || '/tmp' }}
      CX_JOB_ROOT: ${{ matrix.launcher == 'mi-amds' && format('/tmp/inferencex-collectivex-parent-{0}-{1}-{2}/inferencex-collectivex-{0}-{1}-{2}', github.run_id, github.run_attempt, matrix.id) || format('/tmp/inferencex-collectivex-{0}-{1}-{2}', github.run_id, github.run_attempt, matrix.id) }}
      CX_SOURCE_ROOT: ${{ matrix.launcher == 'mi-amds' && format('/tmp/inferencex-collectivex-parent-{0}-{1}-{2}/inferencex-collectivex-{0}-{1}-{2}/source', github.run_id, github.run_attempt, matrix.id) || format('/tmp/inferencex-collectivex-{0}-{1}-{2}/source', github.run_id, github.run_attempt, matrix.id) }}
      HOME: ${{ matrix.launcher == 'mi-amds' && format('/tmp/inferencex-collectivex-parent-{0}-{1}-{2}/inferencex-collectivex-{0}-{1}-{2}/home', github.run_id, github.run_attempt, matrix.id) || format('/tmp/inferencex-collectivex-{0}-{1}-{2}/home', github.run_id, github.run_attempt, matrix.id) }}
    steps:
      - name: Prepare isolated source
        id: source
        env:
          COLLECTIVEX_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import shutil
          import stat
          import time

          pattern = re.compile(r"inferencex-collectivex-[0-9]+-[0-9]+-[A-Za-z0-9._-]+")
          link_pattern = re.compile(
              r"/tmp/inferencex-collectivex-parent-[0-9]+-[0-9]+-[A-Za-z0-9._-]+"
          )
          parent = os.environ["CX_JOB_PARENT"]
          scan_parent = parent
          if parent != "/tmp":
              if not link_pattern.fullmatch(parent):
                  raise SystemExit("CollectiveX isolated parent is invalid")
              shared_parent = os.path.join(os.getcwd(), ".collectivex-jobs")
              try:
                  shared_metadata = os.lstat(shared_parent)
              except FileNotFoundError:
                  os.mkdir(shared_parent, mode=0o700)
                  shared_metadata = os.lstat(shared_parent)
              if (
                  not stat.S_ISDIR(shared_metadata.st_mode)
                  or shared_metadata.st_uid != os.getuid()
                  or stat.S_IMODE(shared_metadata.st_mode) != 0o700
              ):
                  raise SystemExit("CollectiveX shared parent is unsafe")
              if os.path.lexists(parent):
                  raise SystemExit("CollectiveX isolated parent already exists")
              os.symlink(shared_parent, parent)
              scan_parent = shared_parent
          cutoff = time.time() - 86400
          for entry in os.scandir(scan_parent):
              if not pattern.fullmatch(entry.name):
                  continue
              try:
                  metadata = entry.stat(follow_symlinks=False)
              except FileNotFoundError:
                  continue
              if (
                  not stat.S_ISDIR(metadata.st_mode)
                  or metadata.st_uid != os.getuid()
                  or stat.S_IMODE(metadata.st_mode) != 0o700
                  or metadata.st_mtime >= cutoff
              ):
                  continue
              marked = False
              for marker_name in ("cleanup-safe", "cleanup-unsafe"):
                  try:
                      marker = os.stat(
                          os.path.join(entry.path, marker_name), follow_symlinks=False
                      )
                  except FileNotFoundError:
                      continue
                  marked = (
                      stat.S_ISREG(marker.st_mode)
                      and marker.st_uid == os.getuid()
                      and stat.S_IMODE(marker.st_mode) == 0o600
                  )
                  if marked:
                      break
              if marked:
                  shutil.rmtree(entry.path)
          PY
          [ "${CX_JOB_ROOT%/*}" = "$CX_JOB_PARENT" ] \
            && [[ "${CX_JOB_ROOT##*/}" =~ ^inferencex-collectivex-[0-9]+-[0-9]+-[A-Za-z0-9._-]+$ ]] \
            || { echo "CollectiveX isolated root is invalid" >&2; exit 1; }
          [ "$CX_SOURCE_ROOT" = "$CX_JOB_ROOT/source" ] \
            || { echo "CollectiveX source root is invalid" >&2; exit 1; }
          if [ -e "$CX_JOB_ROOT" ] || [ -L "$CX_JOB_ROOT" ]; then
            echo "CollectiveX isolated root already exists" >&2
            exit 1
          fi
          umask 077
          mkdir -m 700 -- "$CX_JOB_ROOT"
          trap 'rc=$?; if [ "$rc" != 0 ]; then rm -rf -- "$CX_JOB_ROOT"; [ "$CX_JOB_PARENT" = /tmp ] || rm -f -- "$CX_JOB_PARENT"; fi; exit "$rc"' EXIT
          mkdir -m 700 -- "$HOME" "$CX_JOB_ROOT/control" "$CX_JOB_ROOT/artifact" "$CX_SOURCE_ROOT"
          : > "$CX_JOB_ROOT/cleanup-safe"
          if ! {
            GIT_CONFIG_NOSYSTEM=1 GIT_CONFIG_GLOBAL=/dev/null git init -q "$CX_SOURCE_ROOT"
            GIT_CONFIG_NOSYSTEM=1 GIT_CONFIG_GLOBAL=/dev/null \
              git -C "$CX_SOURCE_ROOT" remote add origin \
                "https://github.com/${COLLECTIVEX_REPOSITORY}.git"
            GIT_CONFIG_NOSYSTEM=1 GIT_CONFIG_GLOBAL=/dev/null \
              git -C "$CX_SOURCE_ROOT" -c credential.helper= -c protocol.version=2 \
                fetch -q --no-tags --depth=1 origin "$COLLECTIVEX_SOURCE_SHA"
            GIT_CONFIG_NOSYSTEM=1 GIT_CONFIG_GLOBAL=/dev/null \
              git -C "$CX_SOURCE_ROOT" -c advice.detachedHead=false \
                checkout -q --detach FETCH_HEAD
            [ "$(git -C "$CX_SOURCE_ROOT" rev-parse HEAD)" = "$COLLECTIVEX_SOURCE_SHA" ]
          } </dev/null >/dev/null 2>&1; then
            echo "CollectiveX source preparation failed" >&2
            exit 1
          fi
          [ "$(stat -c '%a' "$CX_JOB_ROOT")" = 700 ] \
            || { echo "CollectiveX isolated root has unsafe permissions" >&2; exit 1; }
          echo 'prepared=true' >> "$GITHUB_OUTPUT"
          trap - EXIT
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cxsweep-matrix-${{ github.run_id }}
          path: ${{ env.CX_JOB_ROOT }}/control
      - name: Download pinned backend source archive
        if: ${{ matrix.backend == 'deepep-v2' || matrix.backend == 'deepep-hybrid' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cxbackend-sources-${{ github.run_id }}
          path: ${{ env.CX_JOB_ROOT }}/control
      - name: Install pinned backend source seed
        if: ${{ matrix.backend == 'deepep-v2' || matrix.backend == 'deepep-hybrid' }}
        env:
          EXPECTED_BACKEND: ${{ matrix.backend }}
        run: |
          set -euo pipefail
          archive="$CX_JOB_ROOT/control/collectivex-backend-sources.tar"
          destination="$CX_SOURCE_ROOT/experimental/CollectiveX"
          seed_root="$destination/.cx_sources"
          [ -f "$archive" ] && [ ! -e "$seed_root" ] && [ ! -L "$seed_root" ]
          chmod 600 -- "$archive"
          source "$destination/runtime/common.sh"
          source_path="$(cx_backend_source_path "$seed_root" "$EXPECTED_BACKEND")"
          source_basename="${source_path#"$seed_root/"}"
          [ -n "$source_basename" ] \
            && [ "$source_path" = "$seed_root/$source_basename" ] \
            && [[ "$source_basename" != */* ]]
          python3 "$destination/source_archive.py" \
            "$archive" "$destination" "$source_basename"
          cx_backend_source_is_valid "$EXPECTED_BACKEND" "$source_path"
          printf 'CX_BACKEND_SOURCE_SEED_ROOT=%s\n' "$seed_root" >> "$GITHUB_ENV"
      - name: Extract and validate this execution control
        run: |
          set -euo pipefail
          cd "$CX_SOURCE_ROOT/experimental/CollectiveX" 2>/dev/null \
            || { echo "CollectiveX source is unavailable" >&2; exit 1; }
          python3 sweep_matrix.py \
            --extract-from "$CX_JOB_ROOT/control/matrix_full.json" \
            --shard-id '${{ matrix.id }}' \
            --expect-sku '${{ matrix.sku }}' \
            --expect-backend '${{ matrix.backend }}' \
            --expect-nodes '${{ matrix.nodes }}' \
            --out '${{ env.CX_SHARD_FILE }}' >/dev/null
      - name: Execute sweep cell ${{ matrix.id }}
        id: sweep_shard
        env:
          COLLECTIVEX_OPERATOR_CONFIG_CONTENT: ${{ secrets.COLLECTIVEX_OPERATOR_CONFIG_V1 }}
          COLLECTIVEX_NETWORK_CONFIG_CONTENT: ${{ secrets.COLLECTIVEX_NETWORK_CONFIG_V1 }}
          COLLECTIVEX_H100_CONFIG_CONTENT: ${{ secrets.COLLECTIVEX_H100_CONFIG_V1 }}
          COLLECTIVEX_B300_CONFIG_CONTENT: ${{ secrets.COLLECTIVEX_B300_CONFIG_V1 }}
          COLLECTIVEX_B200_CONFIG_CONTENT: ${{ secrets.COLLECTIVEX_B200_CONFIG_V1 }}
          COLLECTIVEX_MI300_CONFIG_CONTENT: ${{ secrets.COLLECTIVEX_MI300_CONFIG_V1 }}
          COLLECTIVEX_MI355_CONFIG_CONTENT: ${{ secrets.COLLECTIVEX_MI355_CONFIG_V1 }}
          COLLECTIVEX_OPERATOR_AUDIT_SALT: ${{ secrets.COLLECTIVEX_AUDIT_SALT_V1 }}
          COLLECTIVEX_OPERATOR_CONFIG_REQUIRED: '1'
        run: |
          set -euo pipefail
          umask 077
          operator_config="$CX_JOB_ROOT/operator-config.json"
          python3 - "$operator_config" <<'PY'
          import json
          import os
          from pathlib import Path
          import sys

          def pairs(items):
              result = {}
              for key, value in items:
                  if key in result:
                      raise ValueError("duplicate configuration key")
                  result[key] = value
              return result

          def load(name):
              return json.loads(
                  os.environ[name], object_pairs_hook=pairs,
                  parse_constant=lambda _: (_ for _ in ()).throw(ValueError()),
              )

          base = load("COLLECTIVEX_OPERATOR_CONFIG_CONTENT")
          for overlay_name in (
              "COLLECTIVEX_NETWORK_CONFIG_CONTENT", "COLLECTIVEX_H100_CONFIG_CONTENT",
              "COLLECTIVEX_B300_CONFIG_CONTENT",
              "COLLECTIVEX_B200_CONFIG_CONTENT", "COLLECTIVEX_MI300_CONFIG_CONTENT",
              "COLLECTIVEX_MI355_CONFIG_CONTENT",
          ):
              overlay_raw = os.environ.get(overlay_name, "")
              if not overlay_raw:
                  continue
              overlay = load(overlay_name)
              private_fields = {
                  "socket_ifname", "rdma_devices", "ib_gid_index", "rdma_service_level",
                  "rdma_traffic_class",
              }
              if set(overlay) != {"schema_version", "runners"} or overlay["schema_version"] != 1:
                  raise ValueError("invalid network overlay envelope")
              if not isinstance(overlay["runners"], dict) or not overlay["runners"]:
                  raise ValueError("invalid network overlay runners")
              if overlay_name == "COLLECTIVEX_B200_CONFIG_CONTENT":
                  if set(overlay["runners"]) != {"b200-dgxc"}:
                      raise ValueError("invalid B200 overlay runner")
                  private_fields.update({"nodelist", "qos"})
              elif overlay_name == "COLLECTIVEX_H100_CONFIG_CONTENT":
                  if set(overlay["runners"]) != {"h100-dgxc"}:
                      raise ValueError("invalid H100 overlay runner")
                  private_fields.add("exclude_nodes")
              elif overlay_name == "COLLECTIVEX_B300_CONFIG_CONTENT":
                  if set(overlay["runners"]) != {"b300"}:
                      raise ValueError("invalid B300 overlay runner")
                  private_fields.add("exclude_nodes")
              elif overlay_name == "COLLECTIVEX_MI355_CONFIG_CONTENT":
                  if set(overlay["runners"]) != {"mi355x"}:
                      raise ValueError("invalid MI355 overlay runner")
              elif overlay_name == "COLLECTIVEX_MI300_CONFIG_CONTENT":
                  if set(overlay["runners"]) != {"mi300x"}:
                      raise ValueError("invalid MI300 overlay runner")
                  private_fields.update({
                      "partition", "squash_dir", "stage_dir", "exclude_nodes",
                      "nodelist", "lock_dir",
                  })
              for runner, fields in overlay["runners"].items():
                  if not isinstance(fields, dict) or not fields:
                      raise ValueError("invalid network overlay runner")
                  if runner not in base.get("runners", {}):
                      if overlay_name != "COLLECTIVEX_MI300_CONFIG_CONTENT":
                          raise ValueError("invalid network overlay runner")
                      base.setdefault("runners", {})[runner] = {}
                  if set(fields) - private_fields:
                      raise ValueError("private overlay contains a disallowed field")
                  base["runners"][runner].update(fields)
          payload = json.dumps(base, sort_keys=True, separators=(",", ":")) + "\n"
          if len(payload.encode()) > 65536:
              raise ValueError("merged operator configuration is too large")
          path = Path(sys.argv[1])
          descriptor = os.open(path, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
          with os.fdopen(descriptor, "w", encoding="utf-8") as stream:
              stream.write(payload)
          PY
          unset COLLECTIVEX_OPERATOR_CONFIG_CONTENT COLLECTIVEX_NETWORK_CONFIG_CONTENT
          unset COLLECTIVEX_H100_CONFIG_CONTENT COLLECTIVEX_B300_CONFIG_CONTENT
          unset COLLECTIVEX_B200_CONFIG_CONTENT
          unset COLLECTIVEX_MI300_CONFIG_CONTENT COLLECTIVEX_MI355_CONFIG_CONTENT
          unset COLLECTIVEX_OPERATOR_CONFIG_REQUIRED
          export COLLECTIVEX_OPERATOR_CONFIG="$operator_config"
          export COLLECTIVEX_OPERATOR_CONFIG_EPHEMERAL=1
          : > "$CX_JOB_ROOT/cleanup-unsafe"
          rm -f -- "$CX_JOB_ROOT/cleanup-safe"
          cd "$CX_SOURCE_ROOT" 2>/dev/null \
            || { echo "CollectiveX source is unavailable" >&2; exit 1; }
          bash "experimental/CollectiveX/launchers/launch_${{ matrix.launcher }}.sh"
      - name: Reconcile allocation cleanup
        if: ${{ always() && steps.source.outputs.prepared == 'true' }}
        run: |
          set -euo pipefail
          cd "$CX_SOURCE_ROOT" 2>/dev/null \
            || { echo "CollectiveX source is unavailable" >&2; exit 1; }
          source experimental/CollectiveX/runtime/common.sh
          cx_reconcile_recorded_allocation "$CX_JOB_ROOT"
      - name: Classify private scheduler failure
        if: ${{ always() && steps.source.outputs.prepared == 'true' && steps.sweep_shard.outcome == 'failure' }}
        run: |
          set -euo pipefail
          cd "$CX_SOURCE_ROOT" 2>/dev/null \
            || { echo "CollectiveX source is unavailable" >&2; exit 1; }
          source experimental/CollectiveX/runtime/common.sh
          cx_report_private_scheduler_failure
      - name: Confirm allocation cleanup
        id: allocation_cleanup
        if: ${{ always() && steps.source.outputs.prepared == 'true' }}
        run: |
          set -euo pipefail
          [ -f "$CX_JOB_ROOT/cleanup-safe" ] && [ ! -e "$CX_JOB_ROOT/cleanup-unsafe" ] \
            || { echo "CollectiveX allocation cleanup was not confirmed" >&2; exit 1; }
      - name: Validate shard delivery completeness
        id: delivery_contracts
        if: ${{ always() && steps.allocation_cleanup.outcome == 'success' }}
        run: |
          cd "$CX_SOURCE_ROOT" 2>/dev/null \
            || { echo "CollectiveX source is unavailable" >&2; exit 1; }
          python3 experimental/CollectiveX/contracts.py validate-delivery \
            --source "experimental/CollectiveX/${CX_SHARD_FILE}" \
            experimental/CollectiveX/results/*.json
      - name: Shard summary
        if: ${{ always() && steps.delivery_contracts.outcome == 'success' }}
        run: |
          cd "$CX_SOURCE_ROOT" 2>/dev/null \
            || { echo "CollectiveX source is unavailable" >&2; exit 1; }
          python3 experimental/CollectiveX/summarize.py \
            --results-dir experimental/CollectiveX/results --markdown >> "$GITHUB_STEP_SUMMARY" || true
      - name: Stage shard artifact
        id: stage_artifact
        if: ${{ always() && steps.delivery_contracts.outcome == 'success' }}
        run: |
          set -euo pipefail
          cd "$CX_SOURCE_ROOT" 2>/dev/null \
            || { echo "CollectiveX source is unavailable" >&2; exit 1; }
          cp -- experimental/CollectiveX/results/*.json "$CX_JOB_ROOT/artifact/"
      - name: Upload shard results
        id: upload_artifact
        if: always() && steps.stage_artifact.outcome == 'success' && steps.delivery_contracts.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ format('cxshard-{0}-{1}-{2}', matrix.id, github.run_id, github.run_attempt) }}
          path: |
            ${{ env.CX_JOB_ROOT }}/artifact/*.json
          if-no-files-found: error
          retention-days: 14
      - name: Cleanup isolated workspace
        if: ${{ always() && steps.source.outputs.prepared == 'true' }}
        run: |
          set -euo pipefail
          [ "$CX_JOB_PARENT" = /tmp ] \
            || [[ "$CX_JOB_PARENT" =~ ^/tmp/inferencex-collectivex-parent-[0-9]+-[0-9]+-[A-Za-z0-9._-]+$ ]] \
            || { echo "CollectiveX cleanup parent is invalid" >&2; exit 1; }
          [ "${CX_JOB_ROOT%/*}" = "$CX_JOB_PARENT" ] \
            && [[ "${CX_JOB_ROOT##*/}" =~ ^inferencex-collectivex-[0-9]+-[0-9]+-[A-Za-z0-9._-]+$ ]] \
            || { echo "CollectiveX cleanup root is invalid" >&2; exit 1; }
          [ "$CX_SOURCE_ROOT" = "$CX_JOB_ROOT/source" ] \
            || { echo "CollectiveX cleanup source is invalid" >&2; exit 1; }
          [ -f "$CX_JOB_ROOT/cleanup-safe" ] && [ ! -e "$CX_JOB_ROOT/cleanup-unsafe" ] \
            || { echo "CollectiveX allocation cleanup was not confirmed; retaining isolated files" >&2; exit 1; }
          if [ '${{ steps.sweep_shard.outcome }}' = success ] \
              && [ '${{ steps.allocation_cleanup.outcome }}' = success ] \
              && [ '${{ steps.delivery_contracts.outcome }}' = success ] \
              && [ '${{ steps.stage_artifact.outcome }}' = success ] \
              && [ '${{ steps.upload_artifact.outcome }}' = success ] \
              && [ -f "$CX_SOURCE_ROOT/experimental/CollectiveX/runtime/common.sh" ]; then
            # shellcheck source=/dev/null
            if source "$CX_SOURCE_ROOT/experimental/CollectiveX/runtime/common.sh" \
                >/dev/null 2>&1; then
              cx_cleanup_private_logs 0
            fi
          fi
          if [ '${{ steps.sweep_shard.outcome }}' != success ] \
              && [ "$CX_JOB_PARENT" != /tmp ]; then
            rm -f -- "$CX_JOB_PARENT"
            exit 0
          fi
          rm -rf -- "$CX_JOB_ROOT"
          [ "$CX_JOB_PARENT" = /tmp ] || rm -f -- "$CX_JOB_PARENT"

