name: Template - Collect Evals

on:
  workflow_call:
    inputs:
      result-prefix:
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  collect-evals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0

      - name: Download eval artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: eval_results/
          pattern: ${{ inputs.result-prefix && format('eval_{0}_*', inputs.result-prefix) || 'eval_*' }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: utils/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r utils/requirements.txt

      - name: Summarize evals
        run: |
          {
            echo "## Eval Summary"
            echo ""
            python3 utils/collect_eval_results.py eval_results/ "${{ inputs.result-prefix || 'all' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregated evals
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval_results_${{ inputs.result-prefix || 'all' }}
          path: agg_eval_${{ inputs.result-prefix || 'all' }}.json

      - name: Cleanup downloaded eval artifacts
        if: ${{ always() }}
        run: |
          rm -rf eval_results/ || true
