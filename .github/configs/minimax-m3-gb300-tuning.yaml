# Temporary one-off tuning matrix. Do not add to perf-changelog.yaml.
minimaxm3-gb300-tune-prefill-v4:
  image: vllm/vllm-openai:minimax-m3-perf-arm64-13.0.1-7a67223
  model: MiniMaxAI/MiniMax-M3-MXFP8
  model-prefix: minimaxm3
  runner: gb300-nv
  precision: fp8
  framework: dynamo-vllm
  multinode: true
  disagg: true
  scenarios:
    fixed-seq-len:
    - isl: 1024
      osl: 1024
      search-space:
      - conc-list:
        - 2048
        - 4096
        prefill:
          num-worker: 1
          tp: 2
          ep: 2
          dp-attn: true
          additional-settings:
          - CONFIG_FILE=recipes/vllm/minimax-m3-gb300-fp8/tuning/1k1k/disagg-gb300-1p1d-dep2-dep8-pbatch2k-3n.yaml
        decode:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: true
      - conc-list:
        - 2048
        - 4096
        prefill:
          num-worker: 1
          tp: 2
          ep: 2
          dp-attn: true
          additional-settings:
          - CONFIG_FILE=recipes/vllm/minimax-m3-gb300-fp8/tuning/1k1k/disagg-gb300-1p1d-dep2-dep8-pbatch16k-3n.yaml
        decode:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: true
