# Temporary one-off tuning matrix. Do not add to perf-changelog.yaml.
minimaxm3-gb300-tune-wide-ep-v6:
  image: vllm/vllm-openai:minimax-m3-perf-arm64-13.0.1-7a67223
  model: MiniMaxAI/MiniMax-M3-MXFP8
  model-prefix: minimaxm3
  runner: gb300-nv
  precision: fp8
  framework: dynamo-vllm
  multinode: true
  disagg: true
  scenarios:
    fixed-seq-len:
    - isl: 8192
      osl: 1024
      search-space:
      - conc-list:
        - 2048
        - 4096
        prefill:
          num-worker: 8
          tp: 2
          ep: 2
          dp-attn: true
          additional-settings:
          - CONFIG_FILE=recipes/vllm/minimax-m3-gb300-fp8/tuning/8k1k/disagg-gb300-8p2d-dep2-dep8-multifrontend-8n.yaml
        decode:
          num-worker: 2
          tp: 8
          ep: 8
          dp-attn: true
      - conc-list:
        - 2048
        - 4096
        prefill:
          num-worker: 8
          tp: 2
          ep: 2
          dp-attn: true
          additional-settings:
          - CONFIG_FILE=recipes/vllm/minimax-m3-gb300-fp8/tuning/8k1k/disagg-gb300-8p1d-dep2-dep16-multifrontend-8n.yaml
        decode:
          num-worker: 1
          tp: 16
          ep: 16
          dp-attn: true
