# ISB1 master sweep config.
#
# Each stanza pairs a runtime/hardware/model identity with one or more
# replay-config entries. Every (runtime-stack-id, hardware-profile-id,
# canonical-model-id) triple must exist in the referenced export bundle;
# row-level filtering in the hydrator selects the matching cells.
#
# Export-file paths are flat under datasets/isb1/exports/ (no per-engine
# subdirs). Qwen3.5 bundles are suffixed _qwen3.5.json to keep identity
# triples unambiguous.
#
# Core entries keep an explicit 8k1k max-model-len. Extension entries
# intentionally omit max-model-len so the ISB1 workflow derives the
# served-shape value from the export stem (32k1k / 64k1k / 131k1k) at
# execution time.
#
# support-status:
#   supported         — benchmark_certification_status=dataset_replay_verified
#   reviewed_preview  — preview rows, pinned explicitly for disclosure
#   unsupported       — rows retained for bundle coverage; not executed
#
# Current closure: dsr1, gptoss, qwen3.5 on standalone:vllm across core 8k1k
# and extension 32k/64k/131k bands, plus bounded 500k code preview on
# standalone:sglang for gptoss and qwen3.5. SGLang core/extension lanes are
# deferred until matching cells are materialized in the corresponding
# bundles.

dsr1-fp8-b200-isb1-vllm:
  image: vllm/vllm-openai:v0.19.0-cu130
  model: deepseek-ai/DeepSeek-R1-0528
  model-prefix: dsr1
  precision: fp8
  framework: vllm
  runner: b200
  benchmark-type: isb1_replay
  runtime-stack-id: standalone:vllm
  hardware-profile-id: nvidia:b200_sxm_180gb
  canonical-model-id: deepseek_r1_0528
  max-model-len: 10240
  replay-configs:
    - export-file: datasets/isb1/exports/core/chat_8k1k.json
      request-mode: multi-turn
      support-status: supported
      search-space:
        - max-concurrency: 4
          num-warmup-sessions: 1
        - max-concurrency: 8
    - export-file: datasets/isb1/exports/core/code_8k1k.json
      request-mode: multi-turn
      support-status: reviewed_preview
      search-space:
        - max-concurrency: 4
          num-warmup-sessions: 1
        - max-concurrency: 8

