  mechanism: kv_quantization
  mechanism-variant: fp8_e4m3
  compression-method: fp8_e4m3
  compression-scope: kv_cache
  quality-eval-id: ruler_v1
  quality-eval-status: pending
  kv-cache-dtype: fp8_e4m3
  max-model-len: 131072
  replay-configs:
