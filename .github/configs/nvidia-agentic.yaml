# GB200 DeepSeek-V4 disaggregated AgentX frontier. The 3P/2D TEP8/TP8 curve
# covers the middle/high-interactivity range omitted by the one-decode DEP
# throughput curves below. Each engine start carries at most four concurrencies.
dsv4-fp4-gb200-dynamo-vllm-agentic-3p2d-tep8-tp8:
  image: vllm/vllm-openai:v0.23.0
  model: deepseek-ai/DeepSeek-V4-Pro
  model-prefix: dsv4
  runner: gb200
  precision: fp4
  framework: dynamo-vllm
  multinode: true
  disagg: true
  scenarios:
    agentic-coding:
    - duration: 1800
      search-space:
      # Ultra-high-interactivity probes below the historical c16 endpoint.
      - spec-decoding: none
        conc-list: [4, 8]
        prefill:
          num-worker: 3
          tp: 8
          ep: 8
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/vllm/deepseek-v4/agentic/disagg-gb200-3p2d-tep8-tp8-agentic.yaml"
        decode:
          num-worker: 2
          tp: 8
          ep: 1
          dp-attn: false
      - spec-decoding: none
        conc-list: [16, 24, 32, 40]
        prefill:
          num-worker: 3
          tp: 8
          ep: 8
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/vllm/deepseek-v4/agentic/disagg-gb200-3p2d-tep8-tp8-agentic.yaml"
        decode:
          num-worker: 2
          tp: 8
          ep: 1
          dp-attn: false
      - spec-decoding: none
        conc-list: [48, 56, 64, 80]
        prefill:
          num-worker: 3
          tp: 8
          ep: 8
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/vllm/deepseek-v4/agentic/disagg-gb200-3p2d-tep8-tp8-agentic.yaml"
        decode:
          num-worker: 2
          tp: 8
          ep: 1
          dp-attn: false

