  runner: h100-dgxc
  precision: fp8
  framework: sglang
  multinode: false
  scenarios:
    agentic-coding:
    - duration: 1800
      search-space:
      - { tp: 8, ep: 8, offloading: none,    conc-list: [1, 2, 4, 8, 12, 14, 16] }
      - { tp: 8, ep: 8, offloading: hicache, total-cpu-dram-gb: 1612, conc-list: [12, 14, 16, 20, 24, 28, 32, 42] }


