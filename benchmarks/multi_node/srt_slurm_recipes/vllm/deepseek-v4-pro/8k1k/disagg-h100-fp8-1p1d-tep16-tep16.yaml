# DeepSeek-V4-Pro Disaggregated with vLLM (H100 1P+1D / 32-GPU, cross-node TP=16) — 8k/1k
#
# Same engine flags as the 1k1k variant. Only the benchmark block differs
# (ISL=8192, tighter concurrency sweep due to larger prefill work).
#
# See recipes/vllm/deepseek-v4-pro/1k1k/disagg-h100-fp8-1p1d-tep16-tep16.yaml
# for the full rationale (cross-node TP=16 layout, MultiprocExecutor +
# torch.distributed PG handshake, --headless secondary node, IB-backed
# NCCL TP all-reduce, deepseek_v4 parsers, NixlConnector).

name: "deepseek-v4-pro-vllm-disagg-h100-1p1d-tep16-tep16-8k1k"

model:
  path: "dsv4-fp8"
  container: "vllm/vllm-openai:deepseekv4-cu129"
  precision: "fp8"

dynamo:
  hash: 6a159fedd8e4a1563aa647c31f622aedbf254b5b
  install: true

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "h100"
  gpus_per_node: 8
  prefill_nodes: 2
  decode_nodes: 2
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 16
  gpus_per_decode: 16

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: nixl

  prefill_environment:
    VLLM_USE_DEEP_GEMM: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    VLLM_SKIP_P2P_CHECK: "1"
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_SERVER_DEV_MODE: "1"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    NVIDIA_GDRCOPY: "enabled"
    GLOO_SOCKET_IFNAME: "eth0"
    PYTHONUNBUFFERED: "1"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

  decode_environment:
    VLLM_USE_DEEP_GEMM: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    VLLM_SKIP_P2P_CHECK: "1"
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_SERVER_DEV_MODE: "1"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    NVIDIA_GDRCOPY: "enabled"
    GLOO_SOCKET_IFNAME: "eth0"
    PYTHONUNBUFFERED: "1"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      trust-remote-code: true
      kv-cache-dtype: "fp8"
      block-size: 256
      no-enable-prefix-caching: true
      no-enable-flashinfer-autotune: true
      tensor-parallel-size: 16
      pipeline-parallel-size: 1
      enable-expert-parallel: true
      enforce-eager: true
      max-model-len: 16384
      max-num-seqs: 512
      max-num-batched-tokens: 512
      gpu-memory-utilization: 0.95
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      trust-remote-code: true
      kv-cache-dtype: "fp8"
      block-size: 256
      no-enable-prefix-caching: true
      no-enable-flashinfer-autotune: true
      tensor-parallel-size: 16
      pipeline-parallel-size: 1
      enable-expert-parallel: true
      enforce-eager: true
      max-model-len: 16384
      max-num-seqs: 512
      max-num-batched-tokens: 512
      gpu-memory-utilization: 0.95
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "4x8x16x32x64"
  req_rate: "inf"
  use_chat_template: false
