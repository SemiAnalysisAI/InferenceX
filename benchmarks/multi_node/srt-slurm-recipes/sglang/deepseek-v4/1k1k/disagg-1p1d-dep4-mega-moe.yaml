name: "dsv4-pro-gb300-disagg-1p1d-dep4-mega-moe-1k1k"

dynamo:
  install: false

setup_script: gb300-cw-sglang-container-deps.sh

extra_mount:
  - "/mnt/vast/dynamo_cache:/mnt/vast/dynamo_cache"

sbatch_directives:
  segment: "2"
  mem: "0"

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

frontend:
  type: dynamo
  nginx_container: nginx

model:
  path: "dsv4-pro"
  container: "dsv4-grace-blackwell"
  precision: "mxfp4"

resources:
  gpu_type: "gb300"
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 1
  decode_workers: 1
  gpus_per_node: 4

backend:
  type: sglang

  prefill_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    SGLANG_JIT_DEEPGEMM_FAST_WARMUP: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_OPT_USE_CUSTOM_ALL_REDUCE_V2: "1"
    SGLANG_OPT_USE_DEEPGEMM_MEGA_MOE: "1"
    SGLANG_OPT_DEEPGEMM_MEGA_MOE_NUM_MAX_TOKENS_PER_RANK: "4096"
    SGLANG_OPT_FIX_MEGA_MOE_MEMORY: "1"
    SGLANG_OPT_FIX_HASH_MEGA_MOE: "1"
    SGLANG_OPT_FIX_NEXTN_MEGA_MOE: "1"
    SGLANG_OPT_USE_FAST_MASK_EP: "1"
    SGLANG_OPT_USE_JIT_INDEXER_METADATA: "1"
    SGLANG_OPT_USE_JIT_NORM: "1"
    SGLANG_OPT_USE_TOPK_V2: "1"
    SGLANG_OPT_SWA_SPLIT_LEAF_ON_INSERT: "1"
    SGLANG_DEEPEP_NUM_MAX_DISPATCH_TOKENS_PER_RANK: "0"

  decode_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    SGLANG_JIT_DEEPGEMM_FAST_WARMUP: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_OPT_USE_CUSTOM_ALL_REDUCE_V2: "1"
    SGLANG_OPT_USE_DEEPGEMM_MEGA_MOE: "1"
    SGLANG_OPT_DEEPGEMM_MEGA_MOE_NUM_MAX_TOKENS_PER_RANK: "4096"
    SGLANG_OPT_FIX_MEGA_MOE_MEMORY: "1"
    SGLANG_OPT_FIX_HASH_MEGA_MOE: "1"
    SGLANG_OPT_FIX_NEXTN_MEGA_MOE: "1"
    SGLANG_OPT_USE_FAST_MASK_EP: "1"
    SGLANG_OPT_USE_JIT_INDEXER_METADATA: "1"
    SGLANG_OPT_USE_JIT_NORM: "1"
    SGLANG_OPT_USE_TOPK_V2: "1"
    SGLANG_OPT_SWA_SPLIT_LEAF_ON_INSERT: "1"
    SGLANG_DEEPEP_NUM_MAX_DISPATCH_TOKENS_PER_RANK: "0"

  sglang_config:
    prefill:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      model-path: "/model/"
      trust-remote-code: true

      tensor-parallel-size: 4
      data-parallel-size: 4
      enable-dp-attention: true
      moe-a2a-backend: "deepep"
      deepep-config: '{"normal_dispatch":{"num_sms":96},"normal_combine":{"num_sms":96}}'

      disaggregation-mode: "prefill"
      disaggregation-transfer-backend: nixl

      mem-fraction-static: 0.90
      max-running-requests: 1024
      cuda-graph-max-bs: 1024
      chunked-prefill-size: 32768
      disable-radix-cache: true

    decode:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      model-path: "/model/"
      trust-remote-code: true

      tensor-parallel-size: 4
      data-parallel-size: 4
      enable-dp-attention: true
      moe-a2a-backend: "deepep"
      deepep-config: '{"normal_dispatch":{"num_sms":96},"normal_combine":{"num_sms":96}}'

      disaggregation-mode: "decode"
      disaggregation-transfer-backend: nixl

      mem-fraction-static: 0.90
      max-running-requests: 1024
      cuda-graph-max-bs: 1024
      chunked-prefill-size: 32768
      disable-radix-cache: true

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  random_range_ratio: 0.8
  concurrencies: "4x8x16x32x64x128x256x512x1024x1536x2048"
  req_rate: "inf"
  use_chat_template: false
