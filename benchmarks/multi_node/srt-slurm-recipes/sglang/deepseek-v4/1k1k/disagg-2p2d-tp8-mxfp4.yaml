name: "dsv4-pro-gb300-disagg-2p2d-tp8-mxfp4-1k1k"

dynamo:
  install: false

setup_script: gb300-cw-sglang-container-deps.sh

extra_mount:
  - "/mnt/vast/dynamo_cache:/mnt/vast/dynamo_cache"

sbatch_directives:
  segment: "4"
  mem: "0"

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

frontend:
  type: dynamo
  nginx_container: nginx

model:
  path: "dsv4-pro"
  container: "dsv4-grace-blackwell"
  precision: "mxfp4"

resources:
  gpu_type: "gb300"
  prefill_nodes: 2
  decode_nodes: 2
  prefill_workers: 1
  decode_workers: 1
  gpus_per_node: 4

backend:
  type: sglang

  prefill_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"

  decode_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"

  sglang_config:
    prefill:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      model-path: "/model/"
      trust-remote-code: true

      tensor-parallel-size: 8
      moe-runner-backend: "flashinfer_mxfp4"
      disable-flashinfer-autotune: true

      disaggregation-mode: "prefill"
      disaggregation-transfer-backend: nixl

      mem-fraction-static: 0.90
      max-running-requests: 512
      cuda-graph-max-bs: 512
      chunked-prefill-size: 8192
      disable-radix-cache: true

    decode:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      model-path: "/model/"
      trust-remote-code: true

      tensor-parallel-size: 8
      moe-runner-backend: "flashinfer_mxfp4"
      disable-flashinfer-autotune: true

      disaggregation-mode: "decode"
      disaggregation-transfer-backend: nixl

      mem-fraction-static: 0.90
      max-running-requests: 512
      cuda-graph-max-bs: 512
      chunked-prefill-size: 8192
      disable-radix-cache: true

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  random_range_ratio: 0.8
  concurrencies: "4x8x16x32x64x128x256x512"
  req_rate: "inf"
  use_chat_template: false
