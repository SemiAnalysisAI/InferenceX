name: "disagg-h200-1p1d-pcp8-tp16-hicache"

# Full-context GLM-5.2 AgentX qualification for three 8xH200 nodes.
#
# Prefill uses SGLang's DSA LayerSplit path: TP8 supplies eight context-
# parallel ranks (effective attention TP1 x PCP8), which shard KV/indexer
# cache layers before Mooncake transfers complete cache shards to decode.
# Decode uses TP16 across two nodes because DSA DCP is not available in this
# SGLang build; TP16 leaves enough HBM for the explicit 1M-token FP8 KV pool.
# STP is deliberate until the upstream GLM-5.2 MTP + HiCache corruption issue
# is resolved.

model:
  path: "hf:zai-org/GLM-5.2-FP8"
  container: "lmsysorg/sglang:nightly-dev-cu13-20260711-7de33ce8"
  precision: "fp8"

dynamo:
  install: true
  wheel: "1.3.0.dev1"

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: h200
  gpus_per_node: 8
  prefill_nodes: 1
  decode_nodes: 2
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 16

infra:
  etcd_nats_dedicated_node: true
  nats_max_payload_mb: 32

frontend:
  type: dynamo
  nginx_session_affinity: true
  nginx_session_affinity_header: X-Correlation-ID
  env:
    DYN_ROUTER_TEMPERATURE: "10000000"
    PIP_BREAK_SYSTEM_PACKAGES: "1"
  args:
    router-mode: "kv"
    router-reset-states: true
    active-decode-blocks-threshold: "None"
    active-prefill-tokens-threshold: "None"
    active-prefill-tokens-threshold-frac: "None"

backend:
  type: sglang

  prefill_environment:
    HF_HUB_CACHE: "/hf_hub_cache"
    PIP_BREAK_SYSTEM_PACKAGES: "1"
    PYTHONUNBUFFERED: "1"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "900"
    SGLANG_ENABLE_UNIFIED_RADIX_TREE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_OPT_USE_TOPK_V2: "1"
    SGLANG_TIMEOUT_KEEP_ALIVE: "900"

  decode_environment:
    HF_HUB_CACHE: "/hf_hub_cache"
    PIP_BREAK_SYSTEM_PACKAGES: "1"
    PYTHONUNBUFFERED: "1"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "900"
    SGLANG_ENABLE_UNIFIED_RADIX_TREE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_OPT_USE_TOPK_V2: "1"
    SGLANG_TIMEOUT_KEEP_ALIVE: "900"

  sglang_config:
    prefill:
      host: 0.0.0.0
      model-path: /model/
      served-model-name: zai-org/GLM-5.2-FP8
      trust-remote-code: true
      tool-call-parser: glm47
      reasoning-parser: glm45
      tp-size: 8
      ep-size: 1
      attn-cp-size: 8
      enable-prefill-cp: true
      cp-strategy: interleave
      enable-dsa-cache-layer-split: true
      disaggregation-transfer-backend: mooncake
      disaggregation-mode: prefill
      kv-cache-dtype: fp8_e4m3
      context-length: 1048576
      max-total-tokens: 1048576
      chunked-prefill-size: 32768
      mem-fraction-static: 0.85
      max-running-requests: 32
      watchdog-timeout: 86400
      stream-interval: 60
      enable-metrics: true
      enable-hierarchical-cache: true
      hicache-write-policy: write_back
      hicache-ratio: 1
      hicache-io-backend: direct

    decode:
      host: 0.0.0.0
      model-path: /model/
      served-model-name: zai-org/GLM-5.2-FP8
      trust-remote-code: true
      tool-call-parser: glm47
      reasoning-parser: glm45
      tp-size: 16
      ep-size: 1
      disaggregation-transfer-backend: mooncake
      disaggregation-mode: decode
      kv-cache-dtype: fp8_e4m3
      context-length: 1048576
      max-total-tokens: 1048576
      mem-fraction-static: 0.85
      max-running-requests: 32
      cuda-graph-max-bs: 32
      watchdog-timeout: 86400
      stream-interval: 60
      enable-metrics: true
      enable-hierarchical-cache: true
      hicache-write-policy: write_back
      hicache-ratio: 1
      hicache-io-backend: direct

sbatch_directives:
  mem: "0"

srun_options:
  mem: "0"
  container-remap-root: ""

benchmark:
  type: custom
  command: bash /infmax-workspace/benchmarks/multi_node/agentic_srt.sh
  env:
    INFMAX_CONTAINER_WORKSPACE: /infmax-workspace
    RESULT_DIR: /logs/agentic
    PORT: "8000"
    IS_MULTINODE: "true"
    AIPERF_USE_DYNAMO_CONV_AWARE_ROUTING: "1"
    AIPERF_DATASET_MMAP_CACHE_DIR: "/aiperf_mmap_cache"
    HF_HUB_CACHE: "/hf_hub_cache"
    WEKA_LOADER_OVERRIDE: "semianalysis_cc_traces_weka_062126"
