name: minimax-m3-vllm-disagg-b300-p0-1p1d-fp8-dep4-dep8-1k1k
model:
  path: MiniMaxAI/MiniMax-M3-MXFP8
  container: vllm/vllm-openai:vllm-minimax-m3-perf-x86_64-13.0.1-7a67223
  precision: fp8
resources:
  gpu_type: b300
  gpus_per_node: 8
  prefill_nodes: 1
  prefill_workers: 1
  gpus_per_prefill: 4
  decode_nodes: 1
  decode_workers: 1
  gpus_per_decode: 8
dynamo:
  install: true
  version: 1.3.0.dev20260614
frontend:
  type: dynamo
  enable_multiple_frontends: false
backend:
  type: vllm
  connector: null
  prefill_environment:
    UCX_TLS: cuda_copy,rc
    VLLM_FLOAT32_MATMUL_PRECISION: high
  decode_environment:
    UCX_TLS: cuda_copy,rc
    VLLM_FLOAT32_MATMUL_PRECISION: high
  vllm_config:
    prefill:
      tensor-parallel-size: 1
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      attention-config: '{"backend": "FLASHINFER", "use_trtllm_attention": true, "indexer_kv_dtype": "fp8"}'
      kv-cache-dtype: fp8
      block-size: 128
      gpu-memory-utilization: 0.9
      max-model-len: 2304
      language-model-only: true
      stream-interval: 32
      max-cudagraph-capture-size: 8192
      max-num-batched-tokens: 2048
      max-num-seqs: 1024
    decode:
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      attention-config: '{"backend": "FLASHINFER", "use_trtllm_attention": true, "indexer_kv_dtype": "fp8"}'
      kv-cache-dtype: fp8
      block-size: 128
      gpu-memory-utilization: 0.9
      max-model-len: 2304
      language-model-only: true
      stream-interval: 32
      max-num-batched-tokens: 16384
      tensor-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      max-num-seqs: 4096
      max-cudagraph-capture-size: 8192
health_check:
  max_attempts: 360
  interval_seconds: 10
benchmark:
  type: sa-bench
  isl: 1024
  osl: 1024
  req_rate: inf
  concurrencies: 4096x8192
