name: "minimax-m3-vllm-disagg-gb200-1p1d-tp4-agentic"

model:
  path: "minimax-m3-mxfp8"
  container: "vllm/vllm-openai:nightly-04c2a8deac44fdb1ca3e2b5ec3e6bf16f3f6a914"
  precision: "fp8"

dynamo:
  install: true
  wheel: "1.3.0.dev20260618"

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "6:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 4
  gpus_per_decode: 4

infra:
  etcd_nats_dedicated_node: false
  nats_max_payload_mb: 32

frontend:
  type: dynamo
  enable_multiple_frontends: false
  env:
    DYN_REQUEST_PLANE: "tcp"
    ETCD_LEASE_TTL: "120"
  args:
    router-mode: "kv"
    router-reset-states: true

backend:
  type: vllm
  connector: null
  prefill_environment:
    DYN_REQUEST_PLANE: "tcp"
    ETCD_LEASE_TTL: "120"
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    TORCH_SYMMMEM: "NVSHMEM"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    NCCL_P2P_LEVEL: "NVL"
  decode_environment:
    DYN_REQUEST_PLANE: "tcp"
    ETCD_LEASE_TTL: "120"
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    TORCH_SYMMMEM: "NVSHMEM"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    NCCL_P2P_LEVEL: "NVL"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
      kv-events-config: '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:20080","enable_kv_cache_events":true}'
      served-model-name: "MiniMaxAI/MiniMax-M3-MXFP8"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 4
      pipeline-parallel-size: 1
      max-num-seqs: 64
      max-num-batched-tokens: 8192
      gpu-memory-utilization: 0.92
      attention-backend: "TRITON_ATTN"
      block-size: 128
      language-model-only: true
      enable-prefix-caching: true
      trust-remote-code: true
      stream-interval: 10
    decode:
      kv-transfer-config: '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
      served-model-name: "MiniMaxAI/MiniMax-M3-MXFP8"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 4
      pipeline-parallel-size: 1
      max-num-seqs: 64
      max-num-batched-tokens: 8192
      gpu-memory-utilization: 0.92
      attention-backend: "TRITON_ATTN"
      block-size: 128
      language-model-only: true
      enable-prefix-caching: true
      trust-remote-code: true
      stream-interval: 10

sbatch_directives:
  cpus-per-task: "72"

srun_options:
  container-remap-root: ""

benchmark:
  type: custom
  aiperf_server_metrics: true
  command: free -h; swapon --show; exec bash /infmax-workspace/benchmarks/multi_node/agentic_srt.sh
  env:
    INFMAX_CONTAINER_WORKSPACE: /infmax-workspace
    RESULT_DIR: /logs/agentic
    PORT: "8000"
    IS_MULTINODE: "true"
    AIPERF_DYNAMO_SESSION_TIMEOUT_SECONDS: "14400"
    AIPERF_AGENTIC_CACHE_WARMUP_DURATION: "600"
    AIPERF_BENCHMARK_GRACE_PERIOD: "120"
    AIPERF_DATASET_MMAP_CACHE_DIR: "/aiperf_mmap_cache"
    HF_HUB_CACHE: "/hf_hub_cache"
    WEKA_LOADER_OVERRIDE: "semianalysis_cc_traces_weka_062126"
