name: "minimax-m3-vllm-disagg-b200-2p1d-fp4-dep2-dep8-8k1k"

model:
  path: "nvidia/MiniMax-M3-NVFP4"
  container: "vllm/vllm-openai:nightly-69715823df89b11ee684b84066390cbb9092d5c1"
  precision: "fp4"

resources:
  gpu_type: "b200"
  gpus_per_node: 8
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 2
  decode_workers: 1
  gpus_per_prefill: 2
  gpus_per_decode: 8

dynamo:
  install: true
  version: 1.3.0.dev20260614

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_FLOAT32_MATMUL_PRECISION: high
    UCX_TLS: "cuda_copy,cuda_ipc,tcp,self"

  decode_environment:
    VLLM_FLOAT32_MATMUL_PRECISION: high
    UCX_TLS: "cuda_copy,cuda_ipc,tcp,self"

  vllm_config:
    prefill:
      no-enable-flashinfer-autotune: true
      tensor-parallel-size: 1
      data-parallel-size: 2
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      attention-config: '{"backend": "FLASHINFER", "use_trtllm_attention": true, "indexer_kv_dtype": "fp8"}'
      kv-cache-dtype: fp8
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 9472
      language-model-only: true
      stream-interval: 32

    decode:
      no-enable-flashinfer-autotune: true
      tensor-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      attention-config: '{"backend": "FLASHINFER", "use_trtllm_attention": true, "indexer_kv_dtype": "fp8"}'
      kv-cache-dtype: fp8
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 9472
      language-model-only: true
      stream-interval: 32
      max-num-seqs: 1024  # One DP8 decode worker provides 8 DP ranks.
      max-num-batched-tokens: 16384
      max-cudagraph-capture-size: 4096

health_check:
  max_attempts: 360
  interval_seconds: 10

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "2048"
  req_rate: "inf"
