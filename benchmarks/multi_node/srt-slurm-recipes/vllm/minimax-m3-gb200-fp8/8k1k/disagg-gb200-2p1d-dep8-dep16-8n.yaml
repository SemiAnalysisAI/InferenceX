name: "minimax-m3-vllm-disagg-gb200-2p1d-dep8-dep16-8k1k"

# MiniMax-M3 disaggregated 2P+1D recipe for GB200 (prefill-scaled, 8k1k).
# 2x Prefill DEP8 (4 nodes) -> NixlConnector -> 1x Decode DEP16
# (4 nodes) = 8 nodes. Double prefill workers absorb 8k ISL compute;
# rack-scale DEP16 decode across NVL72. FLASHINFER, block-size 128.

model:
  path: "minimax-m3-mxfp8"
  container: "vllm/vllm-openai:minimax-m3-0618"
  precision: "fp8"

dynamo:
  install: true
  wheel: "1.2.0.dev20260526"

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 720
  interval_seconds: 10


resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 4
  decode_nodes: 4
  prefill_workers: 2
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 16

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13346
      enable-expert-parallel: true
      enforce-eager: true
      max-model-len: 9472
      max-num-seqs: 16
      max-num-batched-tokens: 16384
      block-size: 128
      attention-backend: FLASHINFER
      language-model-only: true
      gpu-memory-utilization: 0.9
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      numa-bind: true
      enable-sleep-mode: true
      stream-interval: 32

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 16
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      max-model-len: 9472
      max-num-seqs: 512
      max-num-batched-tokens: 512
      max-cudagraph-capture-size: 512
      block-size: 128
      attention-backend: FLASHINFER
      language-model-only: true
      gpu-memory-utilization: 0.9
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      numa-bind: true
      enable-sleep-mode: true
      stream-interval: 128

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "512x1024"
