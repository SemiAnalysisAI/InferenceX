name: "minimax-m3-vllm-disagg-gb200-1p1d-dep4-tp4-marlin-fp8-8k1k"

# 1P DEP4 prefill (TP1 DP4 EP, 4 GPU/worker) + 1D TP4 Marlin
# 2 nodes (1P + 1D). Adapted from NV B300 PR #1863.

model:
  path: "minimax-m3-mxfp8"
  container: "vllm/vllm-openai:minimax-m3-perf-arm64-13.0.1-7a67223"
  precision: "fp8"

dynamo:
  install: true
  wheel: "1.2.0.dev20260526"

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 720
  interval_seconds: 10

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 4
  gpus_per_decode: 4

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 1
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 9472
      language-model-only: true
      kv-cache-dtype: fp8
      attention-backend: FLASHINFER
      stream-interval: 32
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 16384

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 4
      enable-expert-parallel: false
      moe-backend: marlin
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 9472
      language-model-only: true
      kv-cache-dtype: fp8
      attention-backend: FLASHINFER
      stream-interval: 32
      max-num-seqs: 1024
      max-num-batched-tokens: 16384
      max-cudagraph-capture-size: 2048

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "1x4x8x16"
  req_rate: "inf"
