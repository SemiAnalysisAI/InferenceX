name: "minimax-m3-vllm-disagg-gb200-1p1d-tep4-tp4-2n-1k1k"

# 1P TEP4 prefill (TP4+EP4, 1 node) + 1D TP4 decode (Marlin MoE,
# 1 node) = 2 nodes. Low-concurrency latency config. B300 optimal
# at conc 1-32. Marlin on TP-only decode (no EP).

model:
  path: "minimax-m3-mxfp8"
  container: "vllm/vllm-openai:nightly-aarch64"
  precision: "fp8"

dynamo:
  install: true
  wheel: "1.2.0.dev20260526"

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 720
  interval_seconds: 10


resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 1
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 4
  gpus_per_decode: 4

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 4
      pipeline-parallel-size: 1
      enable-expert-parallel: true
      enforce-eager: true
      max-model-len: 2304
      max-num-seqs: 16
      max-num-batched-tokens: 16384
      block-size: 128
      attention-backend: FLASHINFER
      language-model-only: true
      gpu-memory-utilization: 0.9
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      numa-bind: true
      enable-sleep-mode: true
      stream-interval: 1

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 4
      moe-backend: marlin
      pipeline-parallel-size: 1
      max-model-len: 2304
      max-num-seqs: 256
      max-num-batched-tokens: 256
      max-cudagraph-capture-size: 128
      block-size: 128
      attention-backend: FLASHINFER
      language-model-only: true
      gpu-memory-utilization: 0.9
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      numa-bind: true
      enable-sleep-mode: true
      stream-interval: 1

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "16x32"
