name: "minimax-m3-vllm-disagg-gb200-2p8d-tep4-dep8-18n-1k1k"

# 2P TEP4 prefill (2 nodes) + 8D DEP8 decode (16 nodes) = 18 nodes
# / 72 GPU. High-concurrency throughput config. B300 optimal at
# conc 1024 is DEP8 (TP1 DP8 EP, dp-attn). Each decode worker
# spans 2 GB200 nodes (8 GPU) over NVL72 NVLink.

model:
  path: "minimax-m3-mxfp8"
  container: "vllm/vllm-openai:nightly-aarch64"
  precision: "fp8"

dynamo:
  install: true
  wheel: "1.2.0.dev20260526"

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 720
  interval_seconds: 10


resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 2
  decode_nodes: 16
  prefill_workers: 2
  decode_workers: 8
  gpus_per_prefill: 4
  gpus_per_decode: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 4
      pipeline-parallel-size: 1
      enable-expert-parallel: true
      enforce-eager: true
      max-model-len: 2304
      max-num-seqs: 16
      max-num-batched-tokens: 16384
      block-size: 128
      attention-backend: FLASHINFER
      language-model-only: true
      gpu-memory-utilization: 0.9
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      numa-bind: true
      enable-sleep-mode: true
      stream-interval: 32

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      max-model-len: 2304
      max-num-seqs: 512
      max-num-batched-tokens: 512
      max-cudagraph-capture-size: 512
      block-size: 128
      attention-backend: FLASHINFER
      language-model-only: true
      gpu-memory-utilization: 0.9
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      numa-bind: true
      enable-sleep-mode: true
      stream-interval: 128

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "1024"
