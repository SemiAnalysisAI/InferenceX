name: "minimax-m3-vllm-disagg-gb300-10p7d-tp4ep1-8k1k"

# MiniMax-M3 GB300 prefill-heavy max-throughput disagg, 17 nodes / 68 GPU.
# At 8k context, prefill is 8x heavier per request: the 5P:12D ratio (tuned
# for light 1k1k prefill) is prefill-bound — 616 reqs queued behind 5 workers.
# This config rebalances to 10P:7D per DSR1/DSV4 GB300 patterns (DSR1 8k1k
# uses 6P:1D; DSV4 uses 10P:8D at 18 nodes). TP4 ep1 decode (no wide EP —
# M3's MoE all-to-all overhead makes it slower). MNNVL KV + cumem.

model:
  path: "hf:MiniMaxAI/MiniMax-M3-MXFP8"
  container: "vllm/vllm-openai:nightly-aarch64"
  precision: "fp8"
dynamo:
  install: true
  wheel: "1.2.0.dev20260526"
sbatch_directives:
  mem: "0"
  cpus-per-task: "72"
srun_options:
  mem: "0"
slurm:
  time_limit: "8:00:00"
health_check:
  max_attempts: 720
  interval_seconds: 10
extra_mount:
  - "__M3_HF_HOME__:__M3_HF_HOME__"

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 10
  decode_nodes: 7
  prefill_workers: 10
  decode_workers: 7
  gpus_per_prefill: 4
  gpus_per_decode: 4

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    HF_HOME: "__M3_HF_HOME__"
    HF_HUB_OFFLINE: "1"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    HF_HOME: "__M3_HF_HOME__"
    HF_HUB_OFFLINE: "1"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 4
      moe-backend: marlin
      pipeline-parallel-size: 1
      enable-cumem-allocator: true
      enforce-eager: true
      max-num-seqs: 16
      max-num-batched-tokens: 16384
      kv-cache-dtype: fp8
      max-model-len: 9472
      block-size: 128
      language-model-only: true
      gpu-memory-utilization: 0.9
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-disable-hybrid-kv-cache-manager: true
      enable-ep-weight-filter: true
      stream-interval: 32

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 4
      moe-backend: marlin
      pipeline-parallel-size: 1
      enable-cumem-allocator: true
      max-num-seqs: 512
      max-num-batched-tokens: 512
      max-cudagraph-capture-size: 512
      kv-cache-dtype: fp8
      max-model-len: 9472
      block-size: 128
      language-model-only: true
      gpu-memory-utilization: 0.9
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-disable-hybrid-kv-cache-manager: true
      enable-ep-weight-filter: true
      stream-interval: 50

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "1024x2048x4096"
