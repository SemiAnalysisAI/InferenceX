name: "minimax-m3-vllm-disagg-gb300-2p2d-tep4-tep8-6n-8k1k"

# 2P TEP4 prefill (2 nodes) + 2D TEP8 decode (4 nodes) = 6 nodes
# / 24 GPU. High-concurrency throughput config. B300 optimal at
# conc 512 is TEP8 (TP8+EP8). Each decode worker spans 2 GB300
# nodes (8 GPU) over NVL72 NVLink.

model:
  path: "minimax-m3-mxfp8"
  container: "vllm/vllm-openai:nightly-aarch64"
  precision: "fp8"

dynamo:
  install: true
  wheel: "1.2.0.dev20260526"

sbatch_directives:
  mem: "0"
  cpus-per-task: "72"
srun_options:
  mem: "0"

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 720
  interval_seconds: 10

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 2
  decode_nodes: 4
  prefill_workers: 2
  decode_workers: 2
  gpus_per_prefill: 4
  gpus_per_decode: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 4
      pipeline-parallel-size: 1
      enable-expert-parallel: true
      enforce-eager: true
      max-model-len: 9472
      max-num-seqs: 16
      max-num-batched-tokens: 16384
      kv-cache-dtype: fp8
      block-size: 128
      language-model-only: true
      gpu-memory-utilization: 0.9
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-disable-hybrid-kv-cache-manager: true
      enable-ep-weight-filter: true
      enable-sleep-mode: true
      stream-interval: 32

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 8
      pipeline-parallel-size: 1
      enable-expert-parallel: true
      max-model-len: 9472
      max-num-seqs: 512
      max-num-batched-tokens: 512
      max-cudagraph-capture-size: 512
      kv-cache-dtype: fp8
      block-size: 128
      language-model-only: true
      gpu-memory-utilization: 0.9
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-disable-hybrid-kv-cache-manager: true
      enable-ep-weight-filter: true
      stream-interval: 128

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "512"
