name: "minimax-m3-vllm-disagg-gb300-1p4d-tp4ep1-8k1k"

# MiniMax-M3 GB300 mid-curve disagg: 1 prefill + 4 decode, TP4 ep1, 5 nodes.
# DSR1 low-latency pattern adapted for M3: multiple independent TP4 decode
# workers instead of wide-EP decode (dep16dec). M3's MoE all-to-all overhead
# makes wide EP slower than independent TP4 workers.
# MNNVL KV transfer + cumem. --block-size 128 mandatory (MSA cache).

model:
  path: "hf:MiniMaxAI/MiniMax-M3-MXFP8"
  container: "vllm/vllm-openai:minimax-m3"
  precision: "fp8"
dynamo:
  install: true
  wheel: "1.2.0.dev20260526"
sbatch_directives:
  mem: "0"
  cpus-per-task: "72"
srun_options:
  mem: "0"
slurm:
  time_limit: "8:00:00"
health_check:
  max_attempts: 720
  interval_seconds: 10
extra_mount:
  - "__M3_HF_HOME__:__M3_HF_HOME__"

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 4
  prefill_workers: 1
  decode_workers: 4
  gpus_per_prefill: 4
  gpus_per_decode: 4

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    HF_HOME: "__M3_HF_HOME__"
    HF_HUB_OFFLINE: "1"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    HF_HOME: "__M3_HF_HOME__"
    HF_HUB_OFFLINE: "1"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 4
      pipeline-parallel-size: 1
      enable-cumem-allocator: true
      enforce-eager: true
      max-num-seqs: 16
      max-num-batched-tokens: 16384
      max-model-len: 9472
      block-size: 128
      language-model-only: true
      gpu-memory-utilization: 0.9
      trust-remote-code: true
      no-enable-prefix-caching: true
      stream-interval: 32

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 4
      pipeline-parallel-size: 1
      enable-cumem-allocator: true
      max-num-seqs: 256
      max-num-batched-tokens: 256
      max-cudagraph-capture-size: 512
      max-model-len: 9472
      block-size: 128
      language-model-only: true
      gpu-memory-utilization: 0.9
      trust-remote-code: true
      no-enable-prefix-caching: true
      stream-interval: 32

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "32x64x128x256"
