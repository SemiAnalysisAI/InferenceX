name: "minimax-m3-vllm-tune-gb300-8p2d-dep2-dep8-multifrontend-fp8-8k1k"

# 8P DEP2 prefill (16 GPUs) + 2D DEP8 decode (16 GPUs).
# Same 32-GPU control cell as the DEP16 arm, including seven frontends.

model:
  path: "minimax-m3-mxfp8"
  container: "vllm/vllm-openai:minimax-m3-perf-arm64-13.0.1-7a67223"
  precision: "fp8"

dynamo:
  install: true
  wheel: "1.2.0.dev20260526"

sbatch_directives:
  mem: "0"
  cpus-per-task: "72"
srun_options:
  mem: "0"

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 720
  interval_seconds: 10

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 4
  decode_nodes: 4
  prefill_workers: 8
  decode_workers: 2
  gpus_per_prefill: 2
  gpus_per_decode: 8

frontend:
  type: dynamo
  enable_multiple_frontends: true
  num_additional_frontends: 6

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 1
      data-parallel-size: 2
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 9472
      language-model-only: true
      kv-cache-dtype: fp8
      stream-interval: 32
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 16384

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      tensor-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 9472
      language-model-only: true
      kv-cache-dtype: fp8
      stream-interval: 32
      max-num-seqs: 512
      max-num-batched-tokens: 512
      max-cudagraph-capture-size: 512

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "2048x4096"
  req_rate: "inf"
  num_prompts_mult: 4
  num_warmup_mult: 1
