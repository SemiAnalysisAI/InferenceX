name: "dsv4-vllm-disagg-gb300-12p1d-dep4-dep16"

# Mirrors NVIDIA/srt-slurm PR #84 (ywang96/gb300-vllm) at SHA
# 228febcfe9c76347cd619a7622af83ca52ca35a4. High 8k/1k:
# 12 prefills (DP=4 each) + 1 wide decode (DP=16). 16 nodes total.
# Fits within one cw rack (18 nodes).

model:
  path: "deepseek-v4-pro"
  container: "vllm/vllm-openai@sha256:d29a90b13bb9758821839dd810db9679055e8adf7c670df9f0a432f45f2488a5"
  precision: "fp4"

dynamo:
  version: 1.0.2
  install: true

setup_script: vllm-container-deps.sh

sbatch_directives:
  segment: "16"
  mem: "0"

slurm:
  time_limit: "3:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 12
  decode_nodes: 4
  prefill_workers: 12
  decode_workers: 1
  gpus_per_prefill: 4
  gpus_per_decode: 16

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_LOG_STATS_INTERVAL: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    NCCL_P2P_LEVEL: NVL
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

  decode_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_LOG_STATS_INTERVAL: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    NCCL_P2P_LEVEL: NVL
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      enforce-eager: true
      max-model-len: 16384
      max-num-seqs: 10
      max-num-batched-tokens: 81920
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-enable-flashinfer-autotune: true
      safetensors-load-strategy: "prefetch"
      no-async-scheduling: true
      block-size: 256
      gpu-memory-utilization: 0.92
      no-disable-hybrid-kv-cache-manager: true
      numa-bind: true
      offload-group-size: 3
      offload-num-in-group: 1
      offload-prefetch-step: 2
      tokenizer-mode: deepseek_v4
      enable-ep-weight-filter: true
      enable-sleep-mode: true

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 16
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      max-model-len: 16384
      max-num-seqs: 512
      max-cudagraph-capture-size: 512
      max-num-batched-tokens: 512
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      gpu-memory-utilization: 0.9
      stream-interval: 50
      no-disable-hybrid-kv-cache-manager: true
      tokenizer-mode: deepseek_v4
      enable-ep-weight-filter: true
      all2all-backend: "flashinfer_nvlink_one_sided"
      enable-sleep-mode: true

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "3072x4096"
  req_rate: "inf"
  use_chat_template: false
