name: "dsv4-vllm-disagg-gb200-3p1d-dep8-dep8"

# Mirrored from NVIDIA/srt-slurm aflowers/gb200-dsv4-recipes branch (PR #77):
#   recipes/vllm/deepseek-v4-pro/8k1k/disagg-gb200-3p1d-dep8-dep8-c2048.yaml
#
# Topology: 3 prefill (DEP=8 each) + 1 decode (DEP=8). 8 nodes total.
# Triples prefill capacity vs 1p1d-dep8-dep8 — note recipe.benchmark.concurrencies
# is currently "256x512x1024" upstream even though the filename says c2048.
#
# Local deltas vs upstream:
#   * model.path alias renamed deepseekv4-fp4 -> deepseek-v4-pro.
#   * model.container kept on the floating :deepseekv4-cu130 tag.
#   * slurm.time_limit added; health_check.max_attempts 360 -> 1440.

model:
  path: "deepseek-v4-pro"
  container: "vllm/vllm-openai:deepseekv4-cu130"
  precision: "fp4"

dynamo:
  hash: 6a159fedd8e4a1563aa647c31f622aedbf254b5b
  install: true

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 6
  decode_nodes: 2
  prefill_workers: 3
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 8
frontend:
  type: dynamo
  enable_multiple_frontends: false
backend:
  type: vllm
  connector: null
  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_RANDOMIZE_DP_DUMMY_INPUTS: "1"
    VLLM_MOE_ROUTING_SIMULATION_STRATEGY: "uniform_random"
    VLLM_LOG_STATS_INTERVAL: "1"
  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_RANDOMIZE_DP_DUMMY_INPUTS: "1"
    VLLM_MOE_ROUTING_SIMULATION_STRATEGY: "uniform_random"
    VLLM_LOG_STATS_INTERVAL: "1"
  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      enforce-eager: true
      max-model-len: 16384
      max-num-seqs: 16
      max-num-batched-tokens: 32768
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-enable-flashinfer-autotune: true
      no-async-scheduling: true
      block-size: 256
      gpu-memory-utilization: 0.8
      no-disable-hybrid-kv-cache-manager: true
      numa-bind: true
      offload-group-size: 3
      offload-num-in-group: 1
      offload-prefetch-step: 2
      tokenizer-mode: deepseek_v4
      enable-ep-weight-filter: true
    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      max-model-len: 16384
      max-num-seqs: 256
      max-cudagraph-capture-size: 256
      max-num-batched-tokens: 256
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      gpu-memory-utilization: 0.9
      stream-interval: 50
      no-disable-hybrid-kv-cache-manager: true
      tokenizer-mode: deepseek_v4
      enable-ep-weight-filter: true
      all2all-backend: "flashinfer_nvlink_one_sided"

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "256x512x1024"
  req_rate: "inf"
  tokenizer_mode: "deepseek_v4"
  use_chat_template: true
