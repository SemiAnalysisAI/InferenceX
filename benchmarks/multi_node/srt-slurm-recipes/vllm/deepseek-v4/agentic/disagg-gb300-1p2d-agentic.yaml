name: "disagg-gb300-1p2d-agentic"

# Topology C (vLLM): 1 prefill (DEP4, 1 node/4 GPU) + 1 decode worker
# spanning 2 nodes (DEP8, 8 GPU) + 1 dedicated NATS/etcd infra node.
# 3 GPU-bearing nodes (1P + 2D = 12 GPU) + 1 infra = 4 nodes total.
# Shrunk from agentic/disagg-gb300-4p1d-dep4-dep8-24-c4096-agentic.yaml:
# prefill 4->1 worker; decode kept at DEP8 (8 GPU/2 nodes) but as the only
# decode topology here. The 2-node DEP8 decode worker form is copied
# verbatim from the 4p1d-agentic reference decode. benchmark hook swapped
# to our custom replay-sweep client.

model:
  path: "deepseek-v4-pro"
  container: "vllm/vllm-openai:v0.21.0-ubuntu2404"
  precision: "fp4"

dynamo:
  install: true
  wheel: "1.2.0.dev20260426"

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

# Topology C: 1 prefill (DEP4, 1 node/4 GPU) + 1 decode (DEP8, 2 nodes/8 GPU).
# 3 GPU-bearing nodes + 1 infra node = 4 nodes.
resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 2
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 4
  gpus_per_decode: 8

infra:
  etcd_nats_dedicated_node: true
  # See sibling 1p6d recipe for rationale — NATS 1 MiB default rejects
  # agentic prompts; 32 MiB gives ~10x headroom over observed payloads.
  nats_max_payload_mb: 32

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_LOG_STATS_INTERVAL: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    TORCH_SYMMMEM: "NVSHMEM"

  decode_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_LOG_STATS_INTERVAL: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    TORCH_SYMMMEM: "NVSHMEM"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      enforce-eager: true
      max-num-seqs: 16
      max-num-batched-tokens: 16384
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      safetensors-load-strategy: "prefetch"
      block-size: 256
      gpu-memory-utilization: 0.9
      no-disable-hybrid-kv-cache-manager: true
      no-async-scheduling: true
      tokenizer-mode: deepseek_v4
      enable-ep-weight-filter: true
      enable-sleep-mode: true
      moe-backend: "deep_gemm_mega_moe"

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      max-num-seqs: 512
      max-cudagraph-capture-size: 512
      trust-remote-code: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      gpu-memory-utilization: 0.9
      stream-interval: 50
      no-disable-hybrid-kv-cache-manager: true
      tokenizer-mode: deepseek_v4
      enable-ep-weight-filter: true
      enable-sleep-mode: true
      moe-backend: "deep_gemm_mega_moe"

sbatch_directives:
  mem: "0"
  cpus-per-task: "72"
srun_options:
  mem: "0"
  container-remap-root: ""

benchmark:
  type: custom
  command: bash /infmax-workspace/benchmarks/multi_node/agentic_replay_custom.sh
  env:
    INFMAX_CONTAINER_WORKSPACE: /infmax-workspace
    RESULT_DIR: /mnt/home/ppbhatt500/gpumode-triton/results/dsv4_vllm_4p_8d
    PORT: "8000"
    IS_MULTINODE: "true"
    CONCURRENCIES: "4,8,16"
