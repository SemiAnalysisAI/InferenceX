name: "svf-vllm-disagg-gb200-1p1d-dep8-dep8-agentic"

# Agentic-coding variant of vllm/deepseek-v4/8k1k/disagg-gb200-mid-curve-megamoe.yaml.
# Topology is identical (1 prefill DEP=8 + 1 decode DEP=8, 16 GPUs across 4
# GB200 nodes + 1 dedicated NATS/etcd infra node) so we can compare against
# the fixed-seq-len mid-curve baseline. Serves the low-latency (conc 32) and
# mid (conc 192) agentic tiers.
#
# Divergence vs the 8k1k sibling (same deltas as the gb300 agentic recipes):
#   - benchmark.type:        sa-bench -> custom (hands off to agentic_srt.sh)
#   - max-model-len:         262144 (NOT removed like on gb300). GB200 has
#                              186 GB HBM vs GB300's 288 GB; letting vLLM
#                              derive DSv4's 1M context needs 24.06 GiB KV
#                              per DEP8 rank but only ~7.9 GiB is free after
#                              FP4 weights + MegaMOE buffers — engine init
#                              dies in _check_enough_kv_cache_memory (R3,
#                              job 18592). 256k fits (~6 GiB) and pairs with
#                              the 256k-capped corpus below, mirroring the
#                              minimaxm2.5 agentic configs.
#   - WEKA_LOADER_OVERRIDE:  060826 *256k* corpus variant + MAX_MODEL_LEN env
#                              so aiperf filters replay inputs to the served
#                              context window.
#   - no-enable-prefix-caching: dropped (prefix caching MUST be on for
#                              trajectory reuse — entire point of agentic)
#   - infra.nats_max_payload_mb: 32 (agentic prompts at 50k-200k DSv4 tokens
#                              serialize to 1-3 MB JSON; NATS' 1 MiB default
#                              rejects them — see gb300 1p6d recipe comment)
#   - srun_options.container-remap-root: pyxis may map the calling user to a
#                              non-root uid in the container; agentic_srt.sh
#                              needs root for `apt-get install git`. No-op
#                              when the container user is already root.
# Note: --enable-auto-tool-choice / --tool-call-parser / --reasoning-parser
# are NOT set on the worker. The dynamo-vllm worker entrypoint doesn't
# accept them (different arg parser than `vllm serve`). In disagg, chat
# parsing happens at the dynamo frontend, not at the worker.

model:
  path: "deepseek-v4-pro"
  container: "vllm/vllm-openai:v0.20.0-ubuntu2404"
  precision: "fp4"

dynamo:
  install: true
  wheel: "1.2.0.dev20260426"

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 2
  decode_nodes: 2
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 8

infra:
  etcd_nats_dedicated_node: true
  # See the gb300 1p6d agentic recipe for rationale — NATS' 1 MiB default
  # rejects long agentic prompts; 32 MiB gives ~10x headroom over the
  # largest observed payload.
  nats_max_payload_mb: 32

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null
  prefill_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    TORCH_SYMMMEM: "NVSHMEM"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"
    VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "1024"
    VLLM_MAX_TOKENS_PER_EXPERT_FP4_MOE: "2048"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_P2P_LEVEL: NVL
  decode_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    TORCH_SYMMMEM: "NVSHMEM"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_P2P_LEVEL: NVL

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      enable-ep-weight-filter: true
      moe-backend: deep_gemm_mega_moe
      enforce-eager: true
      max-model-len: 262144
      max-num-seqs: 16
      max-num-batched-tokens: 32768
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      no-async-scheduling: true
      block-size: 256
      gpu-memory-utilization: 0.95
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true
      numa-bind: true
      tokenizer-mode: deepseek_v4
    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      enable-ep-weight-filter: true
      moe-backend: deep_gemm_mega_moe
      max-model-len: 262144
      max-num-seqs: 512
      max-cudagraph-capture-size: 512
      max-num-batched-tokens: 512
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      gpu-memory-utilization: 0.9
      stream-interval: 50
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true
      tokenizer-mode: deepseek_v4

srun_options:
  # See gb300 agentic recipes: pyxis may map the calling user to a non-root
  # uid inside the container; remap to uid 0 so agentic_srt.sh's apt-get
  # install git works. No-op when the container user is already root.
  container-remap-root: ""

benchmark:
  type: custom
  command: bash /infmax-workspace/benchmarks/multi_node/agentic_srt.sh
  env:
    INFMAX_CONTAINER_WORKSPACE: /infmax-workspace
    RESULT_DIR: /logs/agentic
    PORT: "8000"
    IS_MULTINODE: "true"
    # Container-side path of the aiperf mmap dataset cache; the host-side
    # mount is wired via launch_gb200-nv.sh's srtslurm.yaml default_mounts.
    # Without this, aiperf re-tokenizes + re-writes ~65 GB of mmap files
    # per dataset on every run.
    AIPERF_DATASET_MMAP_CACHE_DIR: "/aiperf_mmap_cache"
    # Persistent HF hub cache (also wired via default_mounts) so the trace
    # dataset isn't re-downloaded on every run. Overrides the workflow-level
    # HF_HUB_CACHE=/mnt/hf_hub_cache, which doesn't exist on these nodes.
    HF_HUB_CACHE: "/hf_hub_cache"
    # The server runs at max-model-len 262144 (see header comment) — replay
    # the 256k-capped corpus and tell aiperf to filter inputs to the served
    # window, mirroring the minimaxm2.5 agentic configs.
    WEKA_LOADER_OVERRIDE: "semianalysis_cc_traces_weka_with_subagents_060826_256k"
    MAX_MODEL_LEN: "262144"
