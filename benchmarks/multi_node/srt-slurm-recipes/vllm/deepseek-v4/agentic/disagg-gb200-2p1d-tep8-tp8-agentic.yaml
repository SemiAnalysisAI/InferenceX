name: "svf-vllm-disagg-gb200-2p1d-tep8-tp8-agentic"

# Throughput-per-GPU candidate: two cache-affinitized TEP8 prefills and one
# TP8 decode. The three replicas use 24 inference GPUs across six GB200 nodes;
# a dedicated infra node brings the allocation to seven nodes.

model:
  path: "deepseek-v4-pro"
  container: "vllm/vllm-openai:v0.23.0"
  precision: "fp4"

dynamo:
  install: true
  wheel: "1.3.0.dev20260618"

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 4
  decode_nodes: 2
  prefill_workers: 2
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 8

infra:
  etcd_nats_dedicated_node: true
  nats_max_payload_mb: 32

frontend:
  type: dynamo
  enable_multiple_frontends: false
  env:
    DYN_REQUEST_PLANE: "tcp"
  args:
    router-mode: "kv"
    router-reset-states: true

backend:
  type: vllm
  connector: null
  prefill_environment:
    DYN_REQUEST_PLANE: "tcp"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    TORCH_SYMMMEM: "NVSHMEM"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"
    VLLM_PREFIX_CACHE_RETENTION_INTERVAL: "32768"
    VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "1024"
    VLLM_MAX_TOKENS_PER_EXPERT_FP4_MOE: "2048"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_RCACHE_MAX_UNRELEASED: "1024"
    UCX_TLS: "cuda_copy,rc"
    NCCL_P2P_LEVEL: NVL
  decode_environment:
    DYN_REQUEST_PLANE: "tcp"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    TORCH_SYMMMEM: "NVSHMEM"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"
    VLLM_PREFIX_CACHE_RETENTION_INTERVAL: "32768"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_RCACHE_MAX_UNRELEASED: "1024"
    UCX_TLS: "cuda_copy,rc"
    NCCL_P2P_LEVEL: NVL

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-events-config: '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:20080","enable_kv_cache_events":true}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 8
      pipeline-parallel-size: 1
      enable-expert-parallel: true
      enable-ep-weight-filter: true
      attention-config: '{"use_fp4_indexer_cache": true}'
      enforce-eager: true
      max-num-seqs: 16
      # Official 32K c52 regressed to 103K total input tok/s versus 187.6K
      # total throughput with the previously validated 16K setting.
      max-num-batched-tokens: 16384
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      no-async-scheduling: true
      block-size: 256
      gpu-memory-utilization: 0.9
      no-disable-hybrid-kv-cache-manager: true
      tokenizer-mode: deepseek_v4
    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 8
      pipeline-parallel-size: 1
      attention-config: '{"use_fp4_indexer_cache": true}'
      max-num-seqs: 512
      max-cudagraph-capture-size: 512
      max-num-batched-tokens: 512
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      gpu-memory-utilization: 0.9
      stream-interval: 50
      all2all-backend: "flashinfer_nvlink_one_sided"
      no-disable-hybrid-kv-cache-manager: true
      tokenizer-mode: deepseek_v4

sbatch_directives:
  cpus-per-task: "72"

srun_options:
  container-remap-root: ""

benchmark:
  type: custom
  aiperf_server_metrics: true
  command: bash /infmax-workspace/benchmarks/multi_node/agentic_srt.sh
  env:
    INFMAX_CONTAINER_WORKSPACE: /infmax-workspace
    RESULT_DIR: /logs/agentic
    PORT: "8000"
    IS_MULTINODE: "true"
    AIPERF_DYNAMO_SESSION_TIMEOUT_SECONDS: "14400"
    AIPERF_DATASET_MMAP_CACHE_DIR: "/aiperf_mmap_cache"
    HF_HUB_CACHE: "/hf_hub_cache"
    WEKA_LOADER_OVERRIDE: "semianalysis_cc_traces_weka_061526"
