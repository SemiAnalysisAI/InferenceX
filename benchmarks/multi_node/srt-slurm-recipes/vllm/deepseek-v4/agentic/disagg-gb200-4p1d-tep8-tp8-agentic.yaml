name: "svf-vllm-disagg-gb200-4p1d-tep8-tp8-agentic"

# Agentic-coding throughput shape for GB200: four cache-affinitized TEP8
# prefill workers and one TP8 decode worker. Every worker spans two four-GPU
# GB200 nodes, for ten nodes / 40 inference GPUs; NATS/etcd share the first
# worker node.
#
# TEP4 does not fit the DSv4 FP4 checkpoint in 186 GiB GB200 HBM: v0.23.0
# reached 182.5 GiB/rank and needed another 1.97 GiB while constructing MoE
# weights (run 27732316539). TP8 is the minimum viable model sharding here.
# Dynamo KV routing plus explicit vLLM KV-event publication preserves cache
# affinity across the four prefill replicas. Unlike DEP, TEP does not put
# unrelated, highly variable agentic requests behind one attention barrier.
# The 2026-06-18 Dynamo wheel is required both for vLLM v0.23 KV-event tuples
# and router-only session_control `bind` affinity. The 2026-05-26 wheel parses
# the KV events but only accepts `open|close`, so it rejects AIPerf's vLLM-safe
# `bind` requests before routing.

model:
  path: "deepseek-v4-pro"
  container: "vllm/vllm-openai:v0.23.0"
  precision: "fp4"

dynamo:
  install: true
  wheel: "1.3.0.dev20260618"

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 8
  decode_nodes: 2
  prefill_workers: 4
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 8

infra:
  etcd_nats_dedicated_node: false
  nats_max_payload_mb: 32

frontend:
  type: dynamo
  enable_multiple_frontends: false
  env:
    # srt-slurm defaults to NATS, whose bounded streaming responders rejected
    # c64 decode handoffs as "all workers are busy". Dynamo documents TCP as
    # the fastest request plane; event publication still uses NATS separately.
    DYN_REQUEST_PLANE: "tcp"
  args:
    router-mode: "kv"
    router-reset-states: true

backend:
  type: vllm
  connector: null
  prefill_environment:
    DYN_REQUEST_PLANE: "tcp"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    TORCH_SYMMMEM: "NVSHMEM"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"
    VLLM_USE_V2_MODEL_RUNNER: "1"
    VLLM_PREFIX_CACHE_RETENTION_INTERVAL: "32768"
    VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "1024"
    VLLM_MAX_TOKENS_PER_EXPERT_FP4_MOE: "2048"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_RCACHE_MAX_UNRELEASED: "1024"
    # TP8 NVFP4 exhausts device memory when vLLM's CuMem allocator wraps model
    # loading. Use the cluster's RDMA transport for NIXL KV transfers instead.
    UCX_TLS: "cuda_copy,rc"
    NCCL_P2P_LEVEL: NVL
  decode_environment:
    DYN_REQUEST_PLANE: "tcp"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    TORCH_SYMMMEM: "NVSHMEM"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"
    VLLM_USE_V2_MODEL_RUNNER: "1"
    VLLM_PREFIX_CACHE_RETENTION_INTERVAL: "32768"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_RCACHE_MAX_UNRELEASED: "1024"
    UCX_TLS: "cuda_copy,rc"
    NCCL_P2P_LEVEL: NVL

  vllm_config:
    prefill:
      # vLLM v0.23 broadcasts rank zero's generated engine ID across each TP
      # group. Leaving engine_id unset gives every prefill replica a distinct
      # ID while keeping both nodes of that replica consistent.
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-events-config: '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:20080","enable_kv_cache_events":true}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 8
      pipeline-parallel-size: 1
      enable-expert-parallel: true
      enable-ep-weight-filter: true
      attention-config: '{"backend": "FLASHINFER_MLA_SPARSE_DSV4", "use_prefill_query_quantization": true, "use_fp4_indexer_cache": true}'
      # enforce-eager: true
      # Inherited from fixed-sequence recipes; let vLLM select the scheduler
      # sequence limit until this is tuned explicitly for the agentic trace.
      # max-num-seqs: 16
      max-num-batched-tokens: 16384
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      block-size: 256
      gpu-memory-utilization: 0.9
      no-disable-hybrid-kv-cache-manager: true
      tokenizer-mode: deepseek_v4
    decode:
      # Decode is the only decode replica, so a deterministic cross-node TP8
      # engine ID remains safe and avoids depending on generated-ID sync here.
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both", "engine_id": "22222222-2222-4222-8222-222222222222"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 8
      pipeline-parallel-size: 1
      attention-config: '{"backend": "FLASHINFER_MLA_SPARSE_DSV4", "use_fp4_indexer_cache": true}'
      # max-num-seqs: 512
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      gpu-memory-utilization: 0.9
      stream-interval: 10
      all2all-backend: "flashinfer_nvlink_one_sided"
      no-disable-hybrid-kv-cache-manager: true
      tokenizer-mode: deepseek_v4

sbatch_directives:
  cpus-per-task: "72"

srun_options:
  container-remap-root: ""

benchmark:
  type: custom
  aiperf_server_metrics: true
  command: bash /infmax-workspace/benchmarks/multi_node/agentic_srt.sh
  env:
    INFMAX_CONTAINER_WORKSPACE: /infmax-workspace
    RESULT_DIR: /logs/agentic
    PORT: "8000"
    IS_MULTINODE: "true"
    AIPERF_DATASET_MMAP_CACHE_DIR: "/aiperf_mmap_cache"
    HF_HUB_CACHE: "/hf_hub_cache"
    WEKA_LOADER_OVERRIDE: "semianalysis_cc_traces_weka_062126"
