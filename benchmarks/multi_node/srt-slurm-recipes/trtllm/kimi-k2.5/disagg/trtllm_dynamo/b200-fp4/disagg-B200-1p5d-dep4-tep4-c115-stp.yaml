name: disagg-B200-1p5d-dep4-tep4-c115-stp
model:
  path: kimik2.5-fp4
  container: dynamo-trtllm
  precision: fp4
identity:
  model:
    repo: nvidia/Kimi-K2.5-NVFP4
  container:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc21
slurm:
  time_limit: 04:00:00
dynamo:
  install: true
  hash: 4025cb6a8992d19fd19eead36065e08ea5301f35
  request_plane: tcp
health_check:
  max_attempts: 540
  interval_seconds: 10
resources:
  gpu_type: b200
  gpus_per_node: 8
  prefill_nodes: 1
  prefill_workers: 1
  gpus_per_prefill: 4
  decode_nodes: 3
  decode_workers: 5
  gpus_per_decode: 4
backend:
  type: trtllm
  prefill_environment:
    TLLM_LOG_LEVEL: INFO
    TRTLLM_SERVER_DISABLE_GC: '1'
    TRTLLM_WORKER_DISABLE_GC: '1'
    TRTLLM_ENABLE_PDL: '1'
    NCCL_GRAPH_MIXING_SUPPORT: '0'
    MIMALLOC_PURGE_DELAY: '0'
    UCX_TLS: rc,cuda_ipc,cuda_copy,sm,self,tcp
  decode_environment:
    TLLM_LOG_LEVEL: INFO
    TRTLLM_SERVER_DISABLE_GC: '1'
    TRTLLM_WORKER_DISABLE_GC: '1'
    TRTLLM_ENABLE_PDL: '1'
    NCCL_GRAPH_MIXING_SUPPORT: '0'
    MIMALLOC_PURGE_DELAY: '0'
    UCX_TLS: rc,cuda_ipc,cuda_copy,sm,self,tcp
  trtllm_config:
    prefill:
      cache_transceiver_config:
        backend: DEFAULT
        kv_transfer_timeout_ms: 600000
        max_tokens_in_buffer: 68736
      cuda_graph_config: null
      disable_overlap_scheduler: true
      enable_attention_dp: true
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.9
      max_batch_size: 2
      max_num_tokens: 16386
      max_seq_len: 8232
      moe_config:
        backend: CUTEDSL
      moe_expert_parallel_size: 4
      nvfp4_gemm_config:
        allowed_backends:
        - cutlass
        - cublaslt
        - cutedsl
        - cuda_core
      pipeline_parallel_size: 1
      print_iter_log: true
      tensor_parallel_size: 4
      trust_remote_code: true
    decode:
      cache_transceiver_config:
        backend: DEFAULT
        kv_transfer_timeout_ms: 600000
        max_tokens_in_buffer: 68736
      cuda_graph_config:
        batch_sizes:
        - 1
        - 2
        - 4
        - 8
        - 16
        enable_padding: true
      enable_attention_dp: false
      enable_lm_head_tp_in_adp: false
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.9
      max_batch_size: 16
      max_num_tokens: 16
      max_seq_len: 9256
      moe_config:
        backend: TRTLLM
        use_low_precision_moe_combine: true
      moe_expert_parallel_size: 4
      num_postprocess_workers: 4
      nvfp4_gemm_config:
        allowed_backends:
        - cutlass
        - cublaslt
        - cutedsl
        - cuda_core
      pipeline_parallel_size: 1
      print_iter_log: true
      stream_interval: 100
      tensor_parallel_size: 4
      trust_remote_code: true
frontend:
  type: dynamo
  enable_multiple_frontends: false
  env:
    ETCD_LEASE_TTL: '120'
benchmark:
  type: sa-bench
  isl: 8192
  osl: 1024
  concurrencies:
  - 115
  req_rate: inf
  num_prompts_mult: 20
