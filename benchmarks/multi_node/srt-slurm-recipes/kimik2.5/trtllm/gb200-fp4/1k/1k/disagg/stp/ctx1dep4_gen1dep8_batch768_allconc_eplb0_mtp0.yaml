benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "4301x6452"
  req_rate: "inf"

frontend:
  type: "dynamo"
  enable_multiple_frontends: false

health_check:
  max_attempts: 360
  interval_seconds: 10

dynamo:
  install: false
