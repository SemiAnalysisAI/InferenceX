name: "kimi_k25_nvfp4_ISL8K_OSL1K_ctx2dep4_gen1dep16_batch16_eplb0_mtp0"

# ctx: 2 prefill workers, TP4/EP4
# gen: 1 decode worker, TP16/EP16, enable_attention_dp=true, max_batch=16
# concurrency: 333

model:
  path: "nvidia/Kimi-K2.5-NVFP4"
  container: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.1.0-dev.2"
  precision: "fp4"

resources:
  gpu_type: "gb200"

  # Prefill: 2 workers x TP4 = 8 GPUs = 2 nodes
  prefill_nodes: 2
  prefill_workers: 2
  gpus_per_prefill: 4

  # Decode: 1 worker x TP16 = 16 GPUs = 4 nodes
  decode_workers: 1
  decode_nodes: 4
  gpus_per_decode: 16

  gpus_per_node: 4

backend:
  type: trtllm

  prefill_environment:
    ENROOT_ALLOW_DEV: "yes"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    TLLM_LOG_LEVEL: "INFO"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"

  decode_environment:
    ENROOT_ALLOW_DEV: "yes"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    TLLM_AUTOTUNER_LOG_LEVEL_DEBUG_TO_INFO: "1"
    TLLM_LOG_LEVEL: "INFO"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"

  trtllm_config:
    prefill:
      tensor_parallel_size: 4
      moe_expert_parallel_size: 4
      pipeline_parallel_size: 1
      enable_attention_dp: true
      disable_overlap_scheduler: true
      trust_remote_code: true
      max_batch_size: 2
      max_num_tokens: 16384
      max_seq_len: 8232
      print_iter_log: true
      cuda_graph_config: null
      moe_config:
        backend: TRTLLM
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.4
      cache_transceiver_config:
        backend: UCX
        max_tokens_in_buffer: 16384

    decode:
      tensor_parallel_size: 16
      moe_expert_parallel_size: 16
      pipeline_parallel_size: 1
      enable_attention_dp: true
      enable_lm_head_tp_in_adp: false
      trust_remote_code: true
      max_batch_size: 16
      max_num_tokens: 16
      max_seq_len: 9256
      print_iter_log: true
      stream_interval: 100
      num_postprocess_workers: 4
      cuda_graph_config:
        enable_padding: true
        batch_sizes:
          - 1
          - 2
          - 4
          - 8
          - 16
      moe_config:
        backend: TRTLLM
        use_low_precision_moe_combine: true
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.8
      cache_transceiver_config:
        backend: UCX
        max_tokens_in_buffer: 16384
      nvfp4_gemm_config:
        allowed_backends:
          - cutlass
          - cublaslt
          - cutedsl
          - cuda_core

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "333"
  req_rate: "inf"

frontend:
  type: "dynamo"
  enable_multiple_frontends: false

health_check:
  max_attempts: 360
  interval_seconds: 10

dynamo:
  install: false
