minimaxm3-fp8-h200-vllm-agentic-topology-probe:
  image: vllm/vllm-openai:nightly-04c2a8deac44fdb1ca3e2b5ec3e6bf16f3f6a914
  model: MiniMaxAI/MiniMax-M3-MXFP8
  model-prefix: minimaxm3
  runner: h200-dgxc
  precision: fp8
  framework: vllm
  multinode: false
  scenarios:
    agentic-coding:
    - duration: 900
      search-space:
      - tp: 4
        offloading: none
        conc-list: [1]
        variant: tp4
        additional-settings: &probe-settings
        - AIPERF_AGENTIC_CACHE_WARMUP_DURATION=300
      - tp: 4
        ep: 4
        offloading: none
        conc-list: [1]
        variant: tep4
        additional-settings: *probe-settings
      - tp: 8
        offloading: none
        conc-list: [1]
        variant: tp8
        additional-settings: *probe-settings
      - tp: 8
        ep: 8
        dp-attn: true
        offloading: none
        conc-list: [1]
        variant: dep8-ep8
        additional-settings:
        - AIPERF_AGENTIC_CACHE_WARMUP_DURATION=300
        - VLLM_ROUTER_POLICY=consistent_hash
