# CollectiveX EP comparison suites.
# Iterable benchmark version — the single authoritative CollectiveX version. Bump
# when a methodology change makes new results incomparable with prior ones; it is
# copied verbatim into the matrix, every emitted case result, every extracted shard
# control, and the run summary so the frontend can group and pick runs by it. This
# is the only place it is set.
version: 1

# One literal timing profile for every comparison-grade point on every SKU/backend;
# the matrix bakes it into each case, so changing it changes comparability — bump
# `version` with it. Eight timed iterations keep each MoRI burst well below its
# sustained-iteration wedge; 128 trials give 1024 observations per component
# (tighter p99 tail — the estimate that drives the chart); 32 warmups meet
# Blackwell's measured clock-ramp floor (B300 dispatch reads ~1787us cold at
# warmup=8, settles to ~85us at warmup>=30; H100/MI355X settle sooner — the extra
# iters are harmless). Trials re-warm every time, so trial count dominates wall-clock.
timing:
  iters_per_trial: 8
  trials_per_point: 128
  warmup_iters_per_trial: 32

# Canonical workload shapes, verified against the upstream model configuration.
workloads:
  deepseek-v3:
    hidden: 7168
    topk: 8
    routed_experts: 256
    verified_against: "deepseek-ai/DeepSeek-V3@e815299b0bcbac849fa540c768ef21845365c9eb/config.json"
    # Seed of the deterministic routing trace — part of the workload's identity;
    # every scheduled case for this workload runs this exact trace.
    seed: 67
    # Measured source-tokens-per-rank per phase. Powers of two for a clean log
    # x-axis; decode runs to 512 tok/rank. Per-backend buffer caps clamp over-cap
    # points (dropped, not silently truncated — see ep_harness.token_ladder).
    token_ladders:
      decode: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512]
      prefill: [256, 512, 1024, 2048]

suites:
  ep-core:
    mode: normal
    workloads: [deepseek-v3]
    # "all" = every SKU registered in configs/platform_config.json; a suite may list a subset.
    platforms: all
    ep_degrees: [8, 16]
    routings: [uniform]
    phases: [decode, prefill]
