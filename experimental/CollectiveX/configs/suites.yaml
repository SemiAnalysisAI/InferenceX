# CollectiveX EP comparison suites.
# Iterable benchmark version — the single authoritative CollectiveX version. Bump
# when a methodology change makes new results incomparable with prior ones; it is
# copied verbatim into the matrix, every emitted case result, every extracted shard
# control, and the run summary so the frontend can group and pick runs by it. This
# is the only place it is set.
version: 1

# Canonical workload shapes, verified against the upstream model configuration.
workloads:
  deepseek-v3:
    hidden: 7168
    topk: 8
    routed_experts: 256
    verified_against: "deepseek-ai/DeepSeek-V3@e815299b0bcbac849fa540c768ef21845365c9eb/config.json"

suites:
  ep-core:
    mode: normal
    workloads: [deepseek-v3]
    platforms: [h100-dgxc, h200-dgxc, b300, b200-dgxc, gb300, gb200, mi300x, mi355x]
    ep_degrees: [8, 16]
    routings: [uniform]
    phases: [decode, prefill]
    token_points_prefill: [256, 512]
