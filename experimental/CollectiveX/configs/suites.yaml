# CollectiveX v1 comparison suites.
schema_version: 1

suites:
  ep-core-v1:
    mode: normal
    workloads: [deepseek-v3-v1]
    platforms: [h100-dgxc, h200-dgxc, b300, b200-dgxc, gb300, gb200, mi300x, mi355x]
    ep_degrees: [8, 16]
    routings: [uniform]
    phases: [decode, prefill]
    token_points_prefill: [256, 512]

  ep-low-latency-v1:
    mode: low-latency
    backends: [deepep, uccl]
    workloads: [deepseek-v3-v1]
    platforms: [h100-dgxc, h200-dgxc, b300, b200-dgxc, gb300, gb200, mi300x, mi355x]
    ep_degrees: [8, 16]
    routings: [uniform]
    phases: [decode]
    token_points_decode: [1, 2, 4, 8, 16, 32, 64, 128]
