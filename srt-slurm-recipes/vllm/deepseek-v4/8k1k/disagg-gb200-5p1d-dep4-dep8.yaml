name: "dsv4-vllm-disagg-gb200-5p1d-dep4-dep8"

# Adapted from NVIDIA/srt-slurm PR #67 (deepseek-v4-pro/8k1k/disagg-gb200-7p1d-dep8-dep16).
# Changes:
#   * DeepSeek-V4-Flash instead of Pro (smaller model, same arch)
#   * 5p1d-dep4-dep8 topology instead of 7p1d-dep8-dep16
#   * dynamo source-install pinned to the vllm.inputs.data fix commit (v1.0.2
#     on PyPI still imports from vllm.inputs.data, which the vLLM in
#     vllm/vllm-openai:deepseekv4-cu130 no longer exposes)

model:
  path: "deepseek-v4-flash"
  container: "vllm/vllm-openai:deepseekv4-cu130"
  precision: "fp4"

dynamo:
  hash: d5803cbe71c0035a725652373a175f01942c4a33
  install: true

setup_script: vllm-container-deps.sh

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 5
  decode_nodes: 2
  prefill_workers: 5
  decode_workers: 1
  gpus_per_prefill: 4
  gpus_per_decode: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"

  decode_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Flash"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      enforce-eager: true
      max-model-len: auto
      max-num-seqs: 2
      max-num-batched-tokens: 16384
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 256
      gpu-memory-utilization: 0.88
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Flash"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      max-model-len: auto
      max-num-seqs: 256
      max-cudagraph-capture-size: 256
      max-num-batched-tokens: 256
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      gpu-memory-utilization: 0.9
      stream-interval: 50
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "2048"
  req_rate: "inf"
