# model-paths is the per-cluster registry of where model checkpoints are
# staged (NVMe / Lustre / NFS). Runner scripts resolve MODEL_PATH,
# SRT_SLURM_MODEL_PREFIX (alias) and SERVED_MODEL_NAME from here via
# runners/lib/resolve_model_path.py instead of hardcoding paths in bash.
# Entries match on model-prefix + precision (+ optional framework) and the
# first match wins, so put framework-specific rows above generic ones.
# path-candidates lists staging locations to probe in order; the first
# existing directory wins, else the last candidate (compute-node-only
# storage may not be visible where the resolver runs).
model-paths:
  cluster:gb200-nv:
    - model-prefix: dsr1
      precision: fp8
      framework: dynamo-trt
      path: /mnt/numa1/groups/sa-shared/models/deepseek-r1-0528
      alias: dsr1-fp8
      served-model-name: deepseek-r1-fp8
    - model-prefix: dsr1
      precision: fp8
      path: /mnt/lustre01/models/deepseek-r1-0528
      alias: dsr1-fp8
    - model-prefix: dsr1
      precision: fp4
      framework: dynamo-trt
      path: /mnt/lustre01/models/deepseek-r1-0528-fp4-v2
      alias: dsr1
      served-model-name: deepseek-r1-fp4
    - model-prefix: dsr1
      precision: fp4
      path: /mnt/lustre01/models/deepseek-r1-0528-fp4-v2
      alias: dsr1-fp4
    - model-prefix: dsv4
      precision: fp4
      framework: dynamo-vllm
      path: /mnt/lustre01/models/DeepSeek-V4-Pro-NVFP4
      alias: deepseek-v4-pro
    - model-prefix: dsv4
