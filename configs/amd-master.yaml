
kimik2.5-fp4-mi355x-vllm-disagg:
  image: vllm/vllm-openai-rocm:nightly-bf610c2f56764e1b30bc6065f4ceace3d6e59036
  model: amd/Kimi-K2.5-MXFP4
  model-prefix: kimik2.5
  runner: mi355x-disagg
  precision: fp4
  framework: vllm-disagg
  multinode: true
  disagg: true
  scenarios:
    fixed-seq-len:
    - isl: 1024
      osl: 1024
      search-space:
      # 1P2D: 1 prefill node (co-located with proxy) + 2 decode nodes = 3 nodes total 
      - spec-decoding: "none"
        conc-list: [ 8, 16, 32, 64, 128, 256, 512 ]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "PREFILL_NODES=1"
          - "VLLM_MORIIO_CONNECTOR_READ_MODE=1"
        decode:
          num-worker: 2
          tp: 8
          ep: 8
          dp-attn: false
          additional-settings:
          - "DECODE_NODES=2"

    - isl: 8192
      osl: 1024
      search-space:
      - spec-decoding: "none"
        conc-list: [ 8, 16, 32, 64, 128, 256, 512 ]
        prefill:
          num-worker: 1
          tp: 8
          ep: 1
          dp-attn: false
          additional-settings:
          - "PREFILL_NODES=1"
          - "VLLM_MORIIO_CONNECTOR_READ_MODE=1"
        decode:
          num-worker: 2
          tp: 8
          ep: 8
          dp-attn: false
          additional-settings:
          - "DECODE_NODES=2"
