version: 1

# Higher scores run first. Scores are uncapped and remain human-readable in
# workflow job labels (for example, ci-priority-p2.750).
base-score: 1.0

adjustments:
  event:
    push: 2.0
  multi-node: 1.25
  agentic: 1.0
  eval-only: 0.0
  precision:
    fp4: 0.75
  spec-decoding:
    mtp: 0.75
    eagle: 0.75
    eagle3: 0.75
  framework-prefix:
    sglang: 0.5
    vllm: 0.5
    dynamo-sglang: 0.5
    dynamo-vllm: 0.5
  model-prefix:
    glm5: 0.75
    glm5.1: 0.75
    kimik2.5: 0.75
    dsv4: 0.75
    minimaxm3: 0.75
    qwen3.5: 0.75
    dsr1: 0.75

labels:
  # Controller verifies skip_queue labeling actor membership.
  skip-queue:
    name: skip_queue
    organization: SemiAnalysisAI
    team-slug: core
  checklist-complete:
    names: [ci-checklist-complete]
    adjustment: 0.25
  patchwork:
    names: [ci-patchwork, engine-patch]
    score: 0.0
    waived-by: [ci-patchwork-waived]

scheduler:
  # Waiting jobs improve by this many score points per hour. This prevents
  # ordinary work from starving without allowing patchwork jobs to jump the
  # queue in a realistic time window.
  aging-per-hour: 0.25
